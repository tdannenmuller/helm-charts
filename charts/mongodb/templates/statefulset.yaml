{{/* Render validation for deployment mode conflicts */}}
{{- include "mongodb.validateShardedCluster" . -}}
{{- if not .Values.shardedCluster.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "mongodb.fullname" . }}
  namespace: {{ include "cloudpirates.namespace" . }}
  labels:
    {{- include "mongodb.labels" . | nindent 4 }}
    service-type: primary-secondary
  {{- with (include "mongodb.annotations" .) }}
  annotations: 
{{- . | indent 4 }}
  {{- end }}
spec:
  {{- if .Values.persistence.persistentVolumeClaimRetentionPolicy }}
  persistentVolumeClaimRetentionPolicy:
    {{- toYaml .Values.persistence.persistentVolumeClaimRetentionPolicy | nindent 4 }}
  {{- end }}
  {{- if .Values.replicaSet.enabled }}
  serviceName: {{ include "mongodb.fullname" . }}-{{ .Values.service.headlessServiceSuffix }}
  podManagementPolicy: {{ .Values.podManagementPolicy }}
  updateStrategy:
    type: {{ .Values.updateStrategyType }}
  replicas: {{ add1 .Values.replicaSet.secondaries }}
  {{- end }}
  {{- if .Values.revisionHistoryLimit }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "mongodb.selectorLabels" . | nindent 6 }}
      service-type: primary-secondary
  template:
    metadata:
      labels:
        {{- include "mongodb.selectorLabels" . | nindent 8 }}
        service-type: primary-secondary
        {{- if .Values.podLabels }}
{{ toYaml .Values.podLabels | indent 8 }}
        {{- end }}
      {{- if or (include "mongodb.annotations" .) .Values.podAnnotations }}
      annotations: 
{{- include "mongodb.annotations" . | indent 8 }}
      {{- if .Values.podAnnotations }}
{{ toYaml .Values.podAnnotations | indent 8 }}
      {{- end }}
      {{- end }}
    spec:
{{- with (include "mongodb.imagePullSecrets" .) }}
{{ . | nindent 6 }}
{{- end }}
      serviceAccountName: {{ include "mongodb.serviceAccountName" . }}
      securityContext: {{ include "cloudpirates.renderPodSecurityContext" . | nindent 8 }}
      {{- if .Values.priorityClassName }}
      priorityClassName: {{ .Values.priorityClassName }}
      {{- end }}
      initContainers:
        - name: {{ .Chart.Name }}-init
          securityContext: {{ include "cloudpirates.renderContainerSecurityContext" . | nindent 12 }} 
          image: {{ include "mongodb.image" . | quote }}
          imagePullPolicy: {{ include "cloudpirates.imagePullPolicy" (dict "image" .Values.image) }}
          volumeMounts:
            - mountPath: /extrainitscripts
              name: extrainitscripts
            - mountPath: /scripts
              name: custom-scripts
            - mountPath: /initscripts
              name: initscripts
            - mountPath: /configs
              name: configs
            {{- if or .Values.config.content .Values.config.existingConfigmap }}
            - name: custom-config
              mountPath: /customconfig
            {{- end }}
            {{- if .Values.replicaSet.enabled }}
            - mountPath: /replicaset
              name: keyfile
            {{- end }}
            {{- if .Values.replicaSet.keySecretName }}
            - mountPath: /keyfile-secret
              name: keyfile-secret
            {{- end }}
          command: [ "/scripts/init.sh" ]
          {{- with .Values.initContainer.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- if and .Values.metrics.enabled .Values.auth.enabled }}
        - name: metrics-uri-init
          image: {{ include "mongodb.metrics.uriEncodeImage" . | quote }}
          imagePullPolicy: {{ .Values.metrics.uriEncodeImage.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              cp /bin/busybox /metrics-config/busybox
              chmod +x /metrics-config/busybox
              urlencode() {
                printf '%s' "$1" | od -An -tx1 | tr -d ' \n' | sed 's/../%&/g' | tr 'a-f' 'A-F'
              }
              ENCODED_USER=$(urlencode "$MONGO_METRICS_USERNAME")
              ENCODED_PASS=$(urlencode "$MONGO_METRICS_PASSWORD")
              printf 'mongodb://%s:%s@127.0.0.1:27017/admin?authSource=admin' "$ENCODED_USER" "$ENCODED_PASS" > /metrics-config/uri
          env:
            - name: MONGO_METRICS_USERNAME
              value: {{ .Values.metrics.username | default .Values.auth.rootUsername | quote }}
            - name: MONGO_METRICS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "mongodb.metrics.secretName" . }}
                  key: {{ include "mongodb.metricsSecretPasswordKey" . }}
          volumeMounts:
            - name: metrics-config
              mountPath: /metrics-config
        {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext: {{ include "cloudpirates.renderContainerSecurityContext" . | nindent 12 }}
          image: {{ include "mongodb.image" . | quote }}
          imagePullPolicy: {{ include "cloudpirates.imagePullPolicy" (dict "image" .Values.image) }}
          command: [ "/extrainitscripts/extra-init.sh" ]
          args:
            {{- range .Values.image.extraArgs }}
            - {{ . }}
            {{- end }}
            - --config
            - {{ include "mongodb.configFullName" . | quote }}
            {{- if .Values.replicaSet.enabled }}
            - --replSet
            - {{ .Values.replicaSet.name | quote }}
            - --keyFile
            - "/replicaset/keyfile"
            {{- end }}
            {{- if .Values.performance.wiredTigerCacheSizeGB }}
            - --wiredTigerCacheSizeGB={{ .Values.performance.wiredTigerCacheSizeGB }}
            {{- end }}
            {{- if .Values.performance.oplogSizeMB }}
            - --oplogSize={{ .Values.performance.oplogSizeMB }}
            {{- end }}
            {{- if .Values.performance.maxIncomingConnections }}
            - --maxConns={{ .Values.performance.maxIncomingConnections }}
            {{- end }}
            {{- if .Values.setParameter.enableLocalhostAuthBypass }}
            - --setParameter=enableLocalhostAuthBypass={{ .Values.setParameter.enableLocalhostAuthBypass }}
            {{- end }}
            {{- if .Values.setParameter.enableFlowControl }}
            - --setParameter=enableFlowControl={{ .Values.setParameter.enableFlowControl }}
            {{- end }}
          ports:
            - name: mongodb
              containerPort: 27017
              protocol: TCP
          env:
            {{- if .Values.auth.enabled }}
            - name: MONGO_INITDB_ROOT_USERNAME
              value: {{ .Values.auth.rootUsername | quote }}
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "mongodb.secretName" . }}
                  key: {{ include "mongodb.secretPasswordKey" . }}
            {{- end }}
            {{- if .Values.customUsers }}
            {{- include "mongodb.customUsers.envVars" (dict "ctx" .) | nindent 12 }}
            {{- end }}
            {{- if and .Values.metrics.enabled .Values.auth.enabled .Values.metrics.username }}
            - name: MONGO_METRICS_USERNAME
              value: {{ .Values.metrics.username | quote }}
            - name: MONGO_METRICS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "mongodb.metrics.secretName" . }}
                  key: {{ include "mongodb.secretPasswordKey" . }}
            {{- end }}
            {{- with .Values.extraEnvVars }}
{{ toYaml . | indent 12 }}
            {{- end }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            exec:
              command:
                - bash
                - -c
                - |
                  mongosh \
                  {{- if .Values.auth.enabled }}
                  -username "${MONGO_INITDB_ROOT_USERNAME}" \
                  --password "${MONGO_INITDB_ROOT_PASSWORD}" \
                  --authenticationDatabase admin \
                  {{- end }}
                  --eval "db.adminCommand('ping')" --quiet
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
            successThreshold: {{ .Values.livenessProbe.successThreshold }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            exec:
              command:
                - bash
                - -c
                - |
                  mongosh \
                  {{- if .Values.auth.enabled }}
                  --username "${MONGO_INITDB_ROOT_USERNAME}" \
                  --password "${MONGO_INITDB_ROOT_PASSWORD}" \
                  --authenticationDatabase admin \
                  {{- end }}
                  --eval 'try{var h=db.adminCommand({hello:1}); if(!(h.isWritablePrimary||h.secondary)) quit(1);}catch(e){quit(1)}' --quiet
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
            successThreshold: {{ .Values.readinessProbe.successThreshold }}
          {{- end }}
          resources: {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - mountPath: /extrainitscripts
              name: extrainitscripts
            - mountPath: /docker-entrypoint-initdb.d
              name: initscripts
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
              {{- if .Values.persistence.subPath }}
              subPath: {{ .Values.persistence.subPath }}
              {{- end }}
            {{- if or .Values.config.content .Values.config.existingConfigmap }}
            - name: configs
              mountPath: {{ .Values.config.mountPath }}
            {{- end }}
            {{- if .Values.replicaSet.enabled }}
            - mountPath: /replicaset
              name: keyfile
            {{- end }}
            {{- if .Values.extraVolumeMounts }}
            {{- toYaml .Values.extraVolumeMounts | nindent 12 }}
            {{- end }}
{{- if .Values.metrics.enabled }}
        - name: metrics
          securityContext: {{ toYaml .Values.metrics.containerSecurityContext | nindent 12 }}
          image: {{ include "mongodb.metrics.image" . | quote }}
          imagePullPolicy: {{ .Values.metrics.image.pullPolicy }}
          {{- if .Values.auth.enabled }}
          command: ["/metrics-config/busybox", "sh", "-c"]
          args:
            - |
              exec /mongodb_exporter \
                --mongodb.uri="$(/metrics-config/busybox cat /metrics-config/uri)" \
                --web.listen-address=0.0.0.0:9216 \
                --collect-all \
                --mongodb.direct-connect{{- range .Values.metrics.extraArgs }} \
                {{ . }}{{- end }}
          {{- with .Values.metrics.extraEnvVars }}
          env:
{{ toYaml . | indent 12}}
          {{- end }}
          volumeMounts:
            - name: metrics-config
              mountPath: /metrics-config
          {{- else }}
          args:
            - --mongodb.uri={{ include "mongodb.metrics.connectionString" . }}
            - --web.listen-address=0.0.0.0:9216
            - --collect-all
            - --mongodb.direct-connect
            {{- range .Values.metrics.extraArgs }}
            - {{ . }}
            {{- end }}
          {{- with .Values.metrics.extraEnvVars }}
          env:
{{ toYaml . | indent 12}}
          {{- end }}
          {{- end }}
          ports:
            - name: http-metrics
              containerPort: 9216
              protocol: TCP
          {{- if .Values.metrics.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: /
              port: http-metrics
            initialDelaySeconds: {{ .Values.metrics.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.metrics.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.metrics.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.metrics.livenessProbe.failureThreshold }}
            successThreshold: {{ .Values.metrics.livenessProbe.successThreshold }}
          {{- end }}
          {{- if .Values.metrics.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: /
              port: http-metrics
            initialDelaySeconds: {{ .Values.metrics.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.metrics.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.metrics.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.metrics.readinessProbe.failureThreshold }}
            successThreshold: {{ .Values.metrics.readinessProbe.successThreshold }}
          {{- end }}
          resources: {{- toYaml .Values.metrics.resources | nindent 12 }}
{{- end }}
      volumes:
        - name: extrainitscripts
          emptyDir: {}
        - name: initscripts
          emptyDir: {}
        - name: configs
          emptyDir: {}
        - name: keyfile
          emptyDir: {}
        {{- if and .Values.metrics.enabled .Values.auth.enabled }}
        - name: metrics-config
          emptyDir: {}
        {{- end }}
        {{- if not .Values.persistence.enabled }}
        - name: data
          emptyDir: {}
        {{- end }}
        {{- if .Values.persistence.existingClaim }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim }}
        {{- end }}
        - name: custom-scripts
          configMap:
            name: {{ include "mongodb.fullname" . }}-init-scripts
            defaultMode: 0555
        {{- if or .Values.config.content .Values.config.existingConfigmap }}
        - name: custom-config
          configMap:
            {{- if .Values.config.existingConfigmap }}
            name: {{ .Values.config.existingConfigmap }}
            {{- else }}
            name: {{ include "mongodb.fullname" . }}-config
            {{- end }}
        {{- end }}
        {{- if and .Values.replicaSet.enabled .Values.replicaSet.keySecretName }}
        - name: keyfile-secret
          secret:
            secretName: {{ .Values.replicaSet.keySecretName }}
            defaultMode: 0400
        {{- end }}
        {{- if .Values.extraVolumes }}
        {{- toYaml .Values.extraVolumes | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.persistence.enabled }}
  {{- if not .Values.persistence.existingClaim }}
  volumeClaimTemplates:
    - metadata:
        name: data
        {{- with $labels := merge (include "mongodb.selectorLabels" . | fromYaml) .Values.persistence.labels .Values.podLabels }}
        labels:
          {{- toYaml $labels | nindent 10 }}
        {{- end }}
        {{- with .Values.persistence.annotations }}
        annotations:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      spec:
        accessModes:
          - {{ .Values.persistence.accessMode | quote }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size | quote }}
    {{- end }}
  {{- end }}
{{- end }}
