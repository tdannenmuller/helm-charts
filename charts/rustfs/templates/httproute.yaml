{{- if .Values.gatewayAPI.httpRoute.enabled -}}
{{- $fullName := include "rustfs.fullname" . -}}
{{- $svcPort := .Values.service.port -}}
{{- $httpRoute := .Values.gatewayAPI.httpRoute -}}
{{- $hostnames := $httpRoute.hostnames -}}
{{- if not $hostnames }}
{{- $hostnames = list -}}
{{- range .Values.ingress.hosts -}}
{{- $hostnames = append $hostnames .host -}}
{{- end -}}
{{- end -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullName }}
  namespace: {{ include "cloudpirates.namespace" . }}
  labels:
    {{- include "rustfs.labels" . | nindent 4 }}
  {{- $annotations := merge $httpRoute.annotations .Values.commonAnnotations }}
  {{- with $annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- range $httpRoute.parentRefs }}
    - name: {{ .name }}
      {{- if .namespace }}
      namespace: {{ .namespace }}
      {{- end }}
      {{- if .sectionName }}
      sectionName: {{ .sectionName }}
      {{- end }}
    {{- end }}
  {{- if $hostnames }}
  hostnames:
    {{- range $hostnames }}
    - {{ . | quote }}
    {{- end }}
  {{- end }}
  rules:
    {{- if $httpRoute.rules }}
    {{- range $httpRoute.rules }}
    - {{- if .matches }}
      matches:
        {{- range .matches }}
        - path:
            type: {{ .path.type }}
            value: {{ .path.value }}
        {{- end }}
      {{- end }}
      backendRefs:
        - name: {{ $fullName }}
          port: {{ $svcPort }}
    {{- end }}
    {{- else }}
    {{- range .Values.ingress.hosts }}
    {{- range .paths }}
    - matches:
        - path:
            type: {{ if eq .pathType "Exact" }}Exact{{ else }}PathPrefix{{ end }}
            value: {{ .path }}
      backendRefs:
        - name: {{ $fullName }}
          port: {{ $svcPort }}
    {{- end }}
    {{- end }}
    {{- end }}
{{- end }}

{{- if and .Values.config.consoleEnabled .Values.gatewayAPI.consoleHttpRoute.enabled }}
---
{{- $consoleFullName := include "rustfs.fullname" . -}}
{{- $consoleHttpRoute := .Values.gatewayAPI.consoleHttpRoute -}}
{{- $consoleHostnames := $consoleHttpRoute.hostnames -}}
{{- if not $consoleHostnames }}
{{- $consoleHostnames = list -}}
{{- range .Values.consoleIngress.hosts -}}
{{- $consoleHostnames = append $consoleHostnames .host -}}
{{- end -}}
{{- end -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $consoleFullName }}-console
  namespace: {{ include "cloudpirates.namespace" . }}
  labels:
    {{- include "rustfs.labels" . | nindent 4 }}
    app.kubernetes.io/component: console
  {{- $consoleAnnotations := merge $consoleHttpRoute.annotations .Values.commonAnnotations }}
  {{- with $consoleAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- range $consoleHttpRoute.parentRefs }}
    - name: {{ .name }}
      {{- if .namespace }}
      namespace: {{ .namespace }}
      {{- end }}
      {{- if .sectionName }}
      sectionName: {{ .sectionName }}
      {{- end }}
    {{- end }}
  {{- if $consoleHostnames }}
  hostnames:
    {{- range $consoleHostnames }}
    - {{ . | quote }}
    {{- end }}
  {{- end }}
  rules:
    {{- if $consoleHttpRoute.rules }}
    {{- range $consoleHttpRoute.rules }}
    - {{- if .matches }}
      matches:
        {{- range .matches }}
        - path:
            type: {{ .path.type }}
            value: {{ .path.value }}
        {{- end }}
      {{- end }}
      backendRefs:
        - name: {{ include "rustfs.fullname" $ }}-pod0
          port: {{ $.Values.consoleService.port }}
    {{- end }}
    {{- else }}
    {{- range .Values.consoleIngress.hosts }}
    {{- range .paths }}
    - matches:
        - path:
            type: {{ if eq .pathType "Exact" }}Exact{{ else }}PathPrefix{{ end }}
            value: {{ .path }}
      backendRefs:
        - name: {{ include "rustfs.fullname" $ }}-pod0
          port: {{ $.Values.consoleService.port }}
    {{- end }}
    {{- end }}
    {{- end }}
{{- end }}
