## @section Global parameters
global:
  ## @param global.imageRegistry Global Docker Image registry
  imageRegistry: ""
  ## @param global.imagePullSecrets Global Docker registry secret names as an array
  imagePullSecrets: []
  #  - my-secret-1
  #  - my-secret-2

## @section Common parameters
## @param nameOverride String to partially override zookeeper.fullname
nameOverride: ""
## @param fullnameOverride String to fully override zookeeper.fullname
fullnameOverride: ""
## @param serverIdOffset Offset for server IDs in zoo.cfg (set to 1 for Bitnami migration where myid starts at 1)
## When migrating from Bitnami Zookeeper:
##   1. Set serverIdOffset: 1 (Bitnami uses 1-based myid: 1,2,3 vs default 0-based: 0,1,2)
##   2. Set persistence.mountPath to match Bitnami data location (e.g., /bitnami/zookeeper)
##   3. Set persistence.dataDir to the actual data directory (e.g., /bitnami/zookeeper/data)
##   4. Add ZOO_DATA_DIR env var via extraEnvVars to point to the data directory
## Example extraEnvVars for Bitnami migration:
##   extraEnvVars:
##     - name: ZOO_DATA_DIR
##       value: "/bitnami/zookeeper/data"
serverIdOffset: 0
## @param commonLabels Labels to add to all deployed objects
commonLabels: {}
## @param commonAnnotations Annotations to add to all deployed objects
commonAnnotations: {}
## @param selectorLabels Override selector labels (app.kubernetes.io/name and app.kubernetes.io/instance)
selectorLabels:
  ## @param selectorLabels.name Override app.kubernetes.io/name selector label
  name: ""
  ## @param selectorLabels.instance Override app.kubernetes.io/instance selector label
  instance: ""

## @section Zookeeper image parameters
image:
  ## @param image.registry Zookeeper image registry
  registry: docker.io
  ## @param image.repository Zookeeper image repository
  repository: zookeeper
  ## @param image.tag Zookeeper image tag
  tag: "3.9.5@sha256:58833914ce20ddc5c515a71fc74a037570832afa04db21903eadfdc3c81aa1d6"
  ## @param image.pullPolicy Zookeeper image pull policy
  imagePullPolicy: Always

## @param replicaCount Number of Zookeeper replicas to deploy
replicaCount: 3
## @param revisionHistoryLimit Number of revisions to keep in history for rollback (set to 0 for unlimited)
revisionHistoryLimit: 10

podDisruptionBudget:
  ## @param podDisruptionBudget.enabled Create a Pod Disruption Budget to ensure high availability during voluntary disruptions
  enabled: true
  ## @param podDisruptionBudget.minAvailable minAvailable for Pod Disruption Budget. Value is not mandatory.
  minAvailable: "51%"
  ## @param podDisruptionBudget.maxUnavailable maxUnavailable for Pod Disruption Budget. Value is not mandatory.
  maxUnavailable: ""

networkPolicy:
  ## @param networkPolicy.enabled Enable network policies
  enabled: false

## @section Zookeeper configuration parameters
## @see https://zookeeper.apache.org/doc/current/zookeeperAdmin.html#sc_configuration
zookeeperConfig:
  ## @param zookeeperConfig.tickTime Zookeeper tick time
  tickTime: 2000
  ## @param zookeeperConfig.initLimit Zookeeper init limit
  initLimit: 10
  ## @param zookeeperConfig.syncLimit Zookeeper sync limit
  syncLimit: 5
  ## @param zookeeperConfig.electionPortBindRetry Zookeeper election port bind retry
  electionPortBindRetry: 10
  ## @param zookeeperConfig.maxClientCnxns Zookeeper max client connections
  maxClientCnxns: 60
  ## @param zookeeperConfig.standaloneEnabled Enable standalone mode (for single node deployments)
  standaloneEnabled: "false"
  ## @param zookeeperConfig.adminServerEnabled Enable admin server
  adminServerEnabled: "false"
  ## @param zookeeperConfig.4lwCommandsWhitelist Zookeeper 4-letter word commands whitelist
  ## possible values are: "srvr,ruok,conf,cons,dump,envi,ruok,mntr,stat" or "*" to allow all commands
  ## @see https://zookeeper.apache.org/doc/r3.5.9/zookeeperAdmin.html#sc_clusterOptions
  commandsWhitelist: "srvr"
  autopurge:
    ## @param zookeeperConfig.autopurge.purgeInterval Zookeeper autopurge purge interval (in hours)
    purgeInterval: 24
    ## @param zookeeperConfig.autopurge.snapRetainCount Zookeeper autopurge snapshot retain count
    snapRetainCount: 3
  admin:
    ## @param zookeeperConfig.admin.enableServer Enable Zookeeper Admin server
    enableServer: "false"
    ## @param zookeeperConfig.admin.serverPort Zookeeper Admin server port
    serverPort: 8080
    ## @param zookeeperConfig.admin.serverAddress Zookeeper Admin server address
    serverAddress: "0.0.0.0"
    ## @param zookeeperConfig.admin.idleTimeout Zookeeper Admin server connection idle timeout (in milliseconds)
    idleTimeout: 30000
    ## @param zookeeperConfig.admin.commandUrl Zookeeper Admin server command URL
    commandUrl: "/commands"
  ## @param zookeeperConfig.extraConfigs Extra ZooKeeper configuration lines to append to zoo.cfg
  extraConfigs: []
  #  - "secureClientPort=2281"
  #  - "authProvider.sasl=org.apache.zookeeper.server.auth.SASLAuthenticationProvider"


## @section Zookeeper Metrics configuration
metrics:
  ## @param metrics.enabled Enable Prometheus metrics exporter
  enabled: true
  service:
    ## @param metrics.service.type Zookeeper metrics service type
    type: ClusterIP
    ## @param metrics.service.ports.port Zookeeper metrics service port
    port: 7000
    ## @param metrics.service.annotations Additional annotations for metrics service
    annotations: {}
    ## @param metrics.service.labels Additional labels for metrics service
    labels: {}
  ## Prometheus ServiceMonitor configuration
  serviceMonitor:
    ## @param metrics.serviceMonitor.enabled Create ServiceMonitor resource(s) for scraping metrics using PrometheusOperator
    enabled: false
    ## @param metrics.serviceMonitor.namespace Namespace in which to create ServiceMonitor resource(s)
    namespace: ""
    ## @param metrics.serviceMonitor.interval Interval at which metrics should be scraped
    interval: 10s
    ## @param metrics.serviceMonitor.scrapeTimeout Timeout after which the scrape is ended
    scrapeTimeout: ""
    ## @param metrics.serviceMonitor.relabelings Specify additional relabeling of metrics
    relabelings: []
    ## @param metrics.serviceMonitor.metricRelabelings Specify additional metric relabeling of metrics
    metricRelabelings: []
    ## @param metrics.serviceMonitor.honorLabels Honor metrics labels
    honorLabels: false
    ## @param metrics.serviceMonitor.selector Prometheus instance selector labels
    selector: {}
    ## @param metrics.serviceMonitor.annotations Additional custom annotations for the ServiceMonitor
    annotations: {}
    ## @param metrics.serviceMonitor.namespaceSelector Namespace selector for ServiceMonitor
    namespaceSelector: {}


## ref: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-container
## @section Zookeeper Container Security Context
containerSecurityContext:
  ## @param containerSecurityContext.runAsUser Set Zookeeper container's Security Context runAsUser
  runAsUser: 1000
  ## @param containerSecurityContext.runAsGroup Set Zookeeper container's Security Context runAsGroup
  runAsGroup: 1000
  ## @param containerSecurityContext.seLinuxOptions Set container's Security Context seLinuxOptions
  seLinuxOptions: {}
  ## @param containerSecurityContext.runAsNonRoot Set Zookeeper container's Security Context runAsNonRoot
  runAsNonRoot: true
  ## @param containerSecurityContext.allowPrivilegeEscalation Set Zookeeper container's privilege escalation
  allowPrivilegeEscalation: false
  ## @param containerSecurityContext.privileged Set container's privileged mode
  privileged: false
  ## @param containerSecurityContext.readOnlyRootFilesystem Mount container root filesystem as read-only
  readOnlyRootFilesystem: true
  ## @param containerSecurityContext.capabilities Linux capabilities to drop or add for the container
  capabilities:
    drop:
    - ALL
  ## @param containerSecurityContext.seccompProfile Seccomp profile for the container
  seccompProfile:
    type: RuntimeDefault

## ref: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-pod
## @section Security Context
podSecurityContext:
  ## @param podSecurityContext.fsGroup Group ID for the volumes of the pod
  fsGroup: 1000

service:
  ## @param service.type Kubernetes service type
  type: ClusterIP
  ports:
    ## @param service.ports.client Zookeeper client service port
    client: 2181
    ## @param service.ports.secureClient Zookeeper secure client service port
    secureClient: 2281
    ## @param service.ports.quorum Zookeeper quorum service port
    quorum: 2888
    ## @param service.ports.leaderElection Zookeeper leader election service port
    leaderElection: 3888
    ## @param service.ports.admin Zookeeper admin service port
    admin: 8080
  ## @param service.annotations Additional annotations to add to the service
  annotations: {}

## @section Resources
resources:
  {}
  ## We usually recommend not to specify default resources and to leave this as a conscious
  ## choice for the user. This also increases chances charts run on environments with little
  ## resources, such as Minikube. If you do want to specify resources, uncomment the following
  ## lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   memory: 512Mi
  # requests:
  #   cpu: 100m
  #   memory: 256Mi

## @param nodeSelector Node selector for pod assignment
nodeSelector: {}

## @param priorityClassName for pod eviction
priorityClassName: ""

## @param tolerations Tolerations for pod assignment
tolerations: []

## @param affinity Affinity rules for pod assignment
affinity: {}

## @section Persistence
persistence:
  ## @param persistence.enabled Enable persistence using Persistent Volume Claims
  enabled: true
  ## @param persistence.storageClass Persistent Volume storage class
  storageClass: ""
  ## @param persistence.annotations Persistent Volume Claim annotations
  annotations: {}
  ## @param persistence.size Persistent Volume size
  size: 8Gi
  ## @param persistence.accessModes Persistent Volume access modes
  accessModes:
    - ReadWriteOnce
  ## @param persistence.existingClaim The name of an existing PVC to use for persistence
  existingClaim: ""
  ## @param mountPath The path where to mount the data volume
  mountPath: /data
  ## @param persistance.dataDir The directory where to store the data
  dataDir: /data

## @section Liveness and readiness probes
livenessProbe:
  ## @param livenessProbe.enabled Enable livenessProbe on zookeeper containers
  enabled: true
  ## @param livenessProbe.initialDelaySeconds Initial delay seconds for livenessProbe
  initialDelaySeconds: 30
  ## @param livenessProbe.periodSeconds Period seconds for livenessProbe
  periodSeconds: 10
  ## @param livenessProbe.timeoutSeconds Timeout seconds for livenessProbe
  timeoutSeconds: 5
  ## @param livenessProbe.failureThreshold Failure threshold for livenessProbe
  failureThreshold: 6
  ## @param livenessProbe.successThreshold Success threshold for livenessProbe
  successThreshold: 1

readinessProbe:
  ## @param readinessProbe.enabled Enable readinessProbe on zookeeper containers
  enabled: true
  ## @param readinessProbe.initialDelaySeconds Initial delay seconds for readinessProbe
  initialDelaySeconds: 5
  ## @param readinessProbe.periodSeconds Period seconds for readinessProbe
  periodSeconds: 10
  ## @param readinessProbe.timeoutSeconds Timeout seconds for readinessProbe
  timeoutSeconds: 5
  ## @param readinessProbe.failureThreshold Failure threshold for readinessProbe
  failureThreshold: 6
  ## @param readinessProbe.successThreshold Success threshold for readinessProbe
  successThreshold: 1


startupProbe:
  ## @param startupProbe.enabled Enable startupProbe on zookeeper containers
  enabled: false
  ## @param startupProbe.initialDelaySeconds Initial delay seconds for startupProbe
  initialDelaySeconds: 10
  ## @param startupProbe.periodSeconds Period seconds for startupProbe
  periodSeconds: 10
  ## @param startupProbe.timeoutSeconds Timeout seconds for startupProbe
  timeoutSeconds: 5
  ## @param startupProbe.failureThreshold Failure threshold for startupProbe
  failureThreshold: 30
  ## @param startupProbe.successThreshold Success threshold for startupProbe
  successThreshold: 1


## @param command Override default container command (useful when the default entrypoint needs to be replaced)
command: []
## @param extraEnvVars Additional environment variables to set
extraEnvVars: []
  # - name: CUSTOM_VAR
  #   value: "custom-value"
  # - name: SECRET_VAR
  #   valueFrom:
  #     secretKeyRef:
  #       name: my-secret
  #       key: secret-key

## @param extraVolumes Additional volumes to add to the pod
extraVolumes: []

## @param extraVolumeMounts Additional volume mounts to add to the zookeeper container
extraVolumeMounts: []

## @param extraObjects Array of extra objects to deploy with the release
extraObjects: []
