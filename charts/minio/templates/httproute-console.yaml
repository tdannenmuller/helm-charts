{{- if .Values.gatewayAPI.consoleHttpRoute.enabled -}}
{{- $fullName := include "minio.fullname" . -}}
{{- $consoleHttpRoute := .Values.gatewayAPI.consoleHttpRoute -}}
{{- $hostnames := $consoleHttpRoute.hostnames -}}
{{- if not $hostnames }}
{{- $hostnames = list -}}
{{- range .Values.consoleIngress.hosts -}}
{{- $hostnames = append $hostnames .host -}}
{{- end -}}
{{- end -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullName }}-console
  namespace: {{ include "cloudpirates.namespace" . }}
  labels:
    {{- include "minio.labels" . | nindent 4 }}
    app.kubernetes.io/component: console
  {{- $annotations := merge $consoleHttpRoute.annotations .Values.commonAnnotations }}
  {{- with $annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- range $consoleHttpRoute.parentRefs }}
    - name: {{ .name }}
      {{- if .namespace }}
      namespace: {{ .namespace }}
      {{- end }}
      {{- if .sectionName }}
      sectionName: {{ .sectionName }}
      {{- end }}
    {{- end }}
  {{- if $hostnames }}
  hostnames:
    {{- range $hostnames }}
    - {{ . | quote }}
    {{- end }}
  {{- end }}
  rules:
    {{- if $consoleHttpRoute.rules }}
    {{- range $consoleHttpRoute.rules }}
    - {{- if .matches }}
      matches:
        {{- range .matches }}
        - path:
            type: {{ .path.type }}
            value: {{ .path.value }}
        {{- end }}
      {{- end }}
      backendRefs:
        - name: {{ $fullName }}
          port: {{ $.Values.service.consolePort }}
    {{- end }}
    {{- else }}
    {{- range .Values.consoleIngress.hosts }}
    {{- range .paths }}
    - matches:
        - path:
            type: {{ if eq .pathType "Exact" }}Exact{{ else }}PathPrefix{{ end }}
            value: {{ .path }}
      backendRefs:
        - name: {{ $fullName }}
          port: {{ $.Values.service.consolePort }}
    {{- end }}
    {{- end }}
    {{- end }}
{{- end }}
