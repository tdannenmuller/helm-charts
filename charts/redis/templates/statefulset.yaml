{{- /* This template renders either a Deployment or a StatefulSet depending on useDeployment and persistence settings. */ -}}
{{- include "redis.auth.acl.validate" . -}}
{{- $useDeployment := and .Values.useDeployment (not .Values.persistence.enabled) -}}
apiVersion: apps/v1
{{- if $useDeployment }}
kind: Deployment
{{- else }}
kind: StatefulSet
{{- end }}
metadata:
  name: {{ include "redis.fullname" . }}
  namespace: {{ include "cloudpirates.namespace" . }}
  labels:
    {{- include "redis.labels" . | nindent 4 }}
  {{- if (include "redis.annotations" .) }}
  annotations:
{{- include "cloudpirates.tplvalues.render" (dict "value" (include "redis.annotations" .) "context" .) | indent 4 }}
  {{- end }}
spec:
  {{- if $useDeployment }}
  strategy:
    {{- if eq .Values.architecture "standalone" }}
    type: RollingUpdate
    {{- else }}
    type: Recreate
    {{- end }}
  {{- else }}
  serviceName: {{ include "redis.fullname" . }}-headless
  {{- end }}
  replicas: {{ if eq .Values.architecture "standalone" }}1{{ else }}{{ .Values.replicaCount }}{{ end }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  selector:
    matchLabels:
      {{- include "redis.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "redis.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if and .Values.sentinel.enabled (eq .Values.architecture "replication") }}
        app.kubernetes.io/component: sentinel
        {{- end }}
      annotations:
        {{- if .Values.config.existingConfigmap }}
        checksum/config: {{ .Values.config.existingConfigmap | sha256sum }}
        {{- else if .Values.config.content }}
        checksum/config: {{ .Values.config.content | sha256sum }}
        {{- end }}
        {{- if .Values.extraConfig }}
        checksum/extraConfig: {{ .Values.extraConfig | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
{{- with (include "redis.imagePullSecrets" .) }}
{{ . | nindent 6 }}
{{- end }}
      securityContext: {{ include "cloudpirates.renderPodSecurityContext" . | nindent 8 }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      serviceAccountName: {{ include "redis.serviceAccountName" . }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if (list "replication" "cluster" | has .Values.architecture) }}
      initContainers:
        - name: redis-init
          image: {{ include "redis.image" . | quote }}
          securityContext: {{ include "cloudpirates.renderContainerSecurityContext" . | nindent 12 }}
          imagePullPolicy: {{ include "cloudpirates.imagePullPolicy" (dict "image" .Values.image) }}
          command:
            - /bin/sh
            - -c
            - |
              {{- if $useDeployment }}
              set -e
              MY_HOSTNAME=$(hostname)
              MY_IP=$(hostname -i | awk '{print $1}')
              touch /tmp/redis.conf
              echo "Deployment mode: hostname=$MY_HOSTNAME, IP=$MY_IP"

              {{- if eq .Values.architecture "replication" }}
              {{- if .Values.sentinel.enabled }}
              HEADLESS_SVC="{{ include "redis.fullname" . }}-headless.{{ include "cloudpirates.namespace" . }}.svc.{{ .Values.clusterDomain }}"
              # Add Redis configurations for better Sentinel failover tolerance
              echo "" >> /tmp/redis.conf
              echo "# Configurations for Kubernetes force deletion tolerance" >> /tmp/redis.conf
              echo "min-slaves-to-write 0" >> /tmp/redis.conf
              echo "min-slaves-max-lag 0" >> /tmp/redis.conf

              # Sentinel discovery: retry loop across all headless IPs, skipping self
              CURRENT_MASTER=""
              SENTINEL_FOUND=false
              echo "Searching for existing sentinel..."
              for retry in $(seq 1 5); do
                for SENTINEL_IP in $(getent hosts "${HEADLESS_SVC}" 2>/dev/null | awk '{print $1}' | sort -u); do
                  [ "$SENTINEL_IP" = "$MY_IP" ] && continue
                  MASTER_INFO=$(redis-cli --no-auth-warning -h "${SENTINEL_IP}" -p {{ .Values.sentinel.port }} {{- if .Values.auth.sentinel }} -a "${REDIS_PASSWORD}"{{- end }} sentinel get-master-addr-by-name {{ .Values.sentinel.masterName }} 2>/dev/null | head -1 || echo "")
                  # Validate response is an IP address (reject error messages like "NOAUTH Authentication required.")
                  # Supports both IPv4 (1.2.3.4) and IPv6 (fd00::1). Valid IPs never contain spaces.
                  if [ -n "$MASTER_INFO" ] && echo "$MASTER_INFO" | grep -qE '^[0-9a-f.:]+$'; then
                    CURRENT_MASTER="$MASTER_INFO"
                    SENTINEL_FOUND=true
                    echo "Found master via sentinel at ${SENTINEL_IP}: $CURRENT_MASTER"
                    break 2
                  elif [ -n "$MASTER_INFO" ]; then
                    echo "WARNING: Sentinel at ${SENTINEL_IP} returned invalid master address: $MASTER_INFO (ignoring)"
                  fi
                done
                [ $retry -lt 5 ] && sleep 3
              done

              # Verify master reachability: after a node failure, sentinel may report a stale master (s_down).
              # If unreachable, fall back to bootstrap election so the cluster can re-form.
              if [ "$SENTINEL_FOUND" = true ] && [ -n "$CURRENT_MASTER" ]; then
                if ! redis-cli --no-auth-warning -h "$CURRENT_MASTER" -p {{ .Values.service.port }} {{- if .Values.auth.enabled }} -a "${REDIS_PASSWORD}"{{- end }} -t 2 PING >/dev/null 2>&1; then
                  echo "WARNING: Sentinel's master $CURRENT_MASTER is unreachable (node failure?), falling back to bootstrap election"
                  SENTINEL_FOUND=false
                  CURRENT_MASTER=""
                else
                  echo "Master $CURRENT_MASTER is reachable, using sentinel info"
                fi
              fi

              # Configure as master or replica based on sentinel info
              if [ "$SENTINEL_FOUND" = true ] && [ -n "$CURRENT_MASTER" ]; then
                MY_HOSTNAME_FQDN="${MY_HOSTNAME}.{{ include "redis.fullname" . }}-headless.{{ include "cloudpirates.namespace" . }}.svc.{{ .Values.clusterDomain }}"
                if [ "$MY_IP" = "$CURRENT_MASTER" ] || [ "$MY_HOSTNAME_FQDN" = "$CURRENT_MASTER" ] || [ "$MY_HOSTNAME" = "$CURRENT_MASTER" ]; then
                  echo "I am the current master according to Sentinel"
                else
                  echo "Configuring as replica of current master: $CURRENT_MASTER"
                  echo "replicaof $CURRENT_MASTER {{ if .Values.tls.enabled }}{{ .Values.tls.port }}{{ else }}{{ .Values.service.port }}{{ end }}" >> /tmp/redis.conf
                  {{- if .Values.auth.enabled }}
                  echo "masterauth ${REDIS_PASSWORD}" >> /tmp/redis.conf
                  {{- end }}
                fi
              else
                # No sentinel found: check for existing Redis master, then elect by lowest IP
                echo "No sentinel found, discovering peers..."
                for i in $(seq 1 10); do
                  IP_COUNT=$(getent hosts "${HEADLESS_SVC}" 2>/dev/null | awk '{print $1}' | sort -u | wc -l)
                  [ "$IP_COUNT" -ge 2 ] && break
                  sleep 2
                done
                ALL_IPS=$(getent hosts "${HEADLESS_SVC}" 2>/dev/null | awk '{print $1}' | sort -Vu)
                echo "Discovered peers: $(echo $ALL_IPS | tr '\n' ' ')"

                # Check if any peer is already a running Redis master (handles rolling updates)
                EXISTING_MASTER=""
                for PEER_IP in $ALL_IPS; do
                  [ "$PEER_IP" = "$MY_IP" ] && continue
                  if redis-cli --no-auth-warning -h "$PEER_IP" -p {{ .Values.service.port }} {{- if .Values.auth.enabled }} -a "${REDIS_PASSWORD}"{{- end }} -t 2 info replication 2>/dev/null | grep -q "role:master"; then
                    EXISTING_MASTER="$PEER_IP"
                    echo "Found existing Redis master at $PEER_IP"
                    break
                  fi
                done

                if [ -n "$EXISTING_MASTER" ]; then
                  echo "Configuring as replica of existing master: $EXISTING_MASTER"
                  echo "replicaof $EXISTING_MASTER {{ if .Values.tls.enabled }}{{ .Values.tls.port }}{{ else }}{{ .Values.service.port }}{{ end }}" >> /tmp/redis.conf
                  {{- if .Values.auth.enabled }}
                  echo "masterauth ${REDIS_PASSWORD}" >> /tmp/redis.conf
                  {{- end }}
                else
                  # No existing master: elect by lowest IP among current peers
                  LOWEST_IP=$(echo "$ALL_IPS" | head -1)
                  echo "No existing master. Electing by lowest IP: ${LOWEST_IP}, my IP: ${MY_IP}"
                  if [ -z "$LOWEST_IP" ] || [ "$MY_IP" = "$LOWEST_IP" ]; then
                    echo "Bootstrap: starting as master (lowest IP: ${MY_IP})"
                  else
                    echo "Bootstrap: waiting for Redis master at ${LOWEST_IP}..."
                    _wait=0
                    until redis-cli --no-auth-warning -h "${LOWEST_IP}" -p {{ .Values.service.port }} {{- if .Values.auth.enabled }} -a "${REDIS_PASSWORD}"{{- end }} PING >/dev/null 2>&1; do
                      _wait=$((_wait + 1))
                      [ $_wait -ge 60 ] && { echo "Timeout waiting for master at ${LOWEST_IP}, starting as independent master"; break; }
                      sleep 1
                    done
                    if redis-cli --no-auth-warning -h "${LOWEST_IP}" -p {{ .Values.service.port }} {{- if .Values.auth.enabled }} -a "${REDIS_PASSWORD}"{{- end }} PING >/dev/null 2>&1; then
                      echo "Configuring as replica of bootstrap master: ${LOWEST_IP}"
                      echo "replicaof ${LOWEST_IP} {{ if .Values.tls.enabled }}{{ .Values.tls.port }}{{ else }}{{ .Values.service.port }}{{ end }}" >> /tmp/redis.conf
                      {{- if .Values.auth.enabled }}
                      echo "masterauth ${REDIS_PASSWORD}" >> /tmp/redis.conf
                      {{- end }}
                    fi
                  fi
                fi
              fi

              # Announce by IP (deployment mode: pods have no stable DNS names)
              {{- if eq .Values.ipFamily "ipv4" }}
              MY_IP=$(hostname -i | grep -oE '([0-9]{1,3}\.){3}[0-9]{1,3}' | head -1)
              if [ -z "$MY_IP" ]; then
                echo "Warning: No IPv4 address found, falling back to first available IP"
                MY_IP=$(hostname -i | awk '{print $1}')
              fi
              {{- else if eq .Values.ipFamily "ipv6" }}
              MY_IP=$(hostname -i | grep -oE '([0-9a-f:]+:+)+[0-9a-f]+' | head -1)
              if [ -z "$MY_IP" ]; then
                echo "Warning: No IPv6 address found, falling back to first available IP"
                MY_IP=$(hostname -i | awk '{print $1}')
              fi
              {{- else }}
              MY_IP=$(hostname -i | awk '{print $1}')
              {{- end }}
              echo "Using IP address: ${MY_IP}"
              echo "replica-announce-ip ${MY_IP}" >> /tmp/redis.conf
              echo "replica-announce-port {{ if .Values.tls.enabled }}{{ .Values.tls.port }}{{ else }}{{ .Values.service.port }}{{ end }}" >> /tmp/redis.conf
              echo "replica-priority 100" >> /tmp/redis.conf
              echo "replica-read-only yes" >> /tmp/redis.conf
              {{- else }}
              # Replication without Sentinel: IP-based deterministic master election
              HEADLESS_SVC="{{ include "redis.fullname" . }}-headless.{{ include "cloudpirates.namespace" . }}.svc.{{ .Values.clusterDomain }}"
              echo "No Sentinel: discovering peers..."
              for i in $(seq 1 10); do
                IP_COUNT=$(getent hosts "${HEADLESS_SVC}" 2>/dev/null | awk '{print $1}' | sort -u | wc -l)
                [ "$IP_COUNT" -ge 2 ] && break
                sleep 2
              done
              ALL_IPS=$(getent hosts "${HEADLESS_SVC}" 2>/dev/null | awk '{print $1}' | sort -Vu)
              echo "Discovered peers: $(echo $ALL_IPS | tr '\n' ' ')"

              # Check if any peer is already a running Redis master
              EXISTING_MASTER=""
              for PEER_IP in $ALL_IPS; do
                [ "$PEER_IP" = "$MY_IP" ] && continue
                if redis-cli --no-auth-warning -h "$PEER_IP" -p {{ .Values.service.port }} {{- if .Values.auth.enabled }} -a "${REDIS_PASSWORD}"{{- end }} -t 2 info replication 2>/dev/null | grep -q "role:master"; then
                  EXISTING_MASTER="$PEER_IP"
                  echo "Found existing Redis master at $PEER_IP"
                  break
                fi
              done

              if [ -n "$EXISTING_MASTER" ]; then
                echo "Configuring as replica of existing master: $EXISTING_MASTER"
                echo "replicaof $EXISTING_MASTER {{ if .Values.tls.enabled }}{{ .Values.tls.port }}{{ else }}{{ .Values.service.port }}{{ end }}" >> /tmp/redis.conf
                {{- if .Values.auth.enabled }}
                echo "masterauth ${REDIS_PASSWORD}" >> /tmp/redis.conf
                {{- end }}
                echo "replica-read-only yes" >> /tmp/redis.conf
              else
                # No existing master: elect by lowest IP
                LOWEST_IP=$(echo "$ALL_IPS" | head -1)
                echo "No existing master. Electing by lowest IP: ${LOWEST_IP}, my IP: ${MY_IP}"
                if [ -z "$LOWEST_IP" ] || [ "$MY_IP" = "$LOWEST_IP" ]; then
                  echo "Bootstrap: starting as master (lowest IP: ${MY_IP})"
                else
                  echo "Bootstrap: waiting for Redis master at ${LOWEST_IP}..."
                  _wait=0
                  until redis-cli --no-auth-warning -h "${LOWEST_IP}" -p {{ .Values.service.port }} {{- if .Values.auth.enabled }} -a "${REDIS_PASSWORD}"{{- end }} PING >/dev/null 2>&1; do
                    _wait=$((_wait + 1))
                    [ $_wait -ge 60 ] && { echo "Timeout waiting for master at ${LOWEST_IP}, starting as independent master"; break; }
                    sleep 1
                  done
                  if redis-cli --no-auth-warning -h "${LOWEST_IP}" -p {{ .Values.service.port }} {{- if .Values.auth.enabled }} -a "${REDIS_PASSWORD}"{{- end }} PING >/dev/null 2>&1; then
                    echo "Configuring as replica of ${LOWEST_IP}"
                    echo "replicaof ${LOWEST_IP} {{ if .Values.tls.enabled }}{{ .Values.tls.port }}{{ else }}{{ .Values.service.port }}{{ end }}" >> /tmp/redis.conf
                    {{- if .Values.auth.enabled }}
                    echo "masterauth ${REDIS_PASSWORD}" >> /tmp/redis.conf
                    {{- end }}
                    echo "replica-read-only yes" >> /tmp/redis.conf
                  fi
                fi
              fi
              {{- end }}
              {{- else if eq .Values.architecture "cluster" }}
              echo "" >> /tmp/redis.conf
              echo "# Default cluster settings" >> /tmp/redis.conf
              echo "cluster-enabled yes" >> /tmp/redis.conf
              echo "cluster-config-file nodes.conf" >> /tmp/redis.conf
              echo "cluster-node-timeout 5000" >> /tmp/redis.conf
              echo "cluster-port {{ .Values.service.clusterPort }}" >> /tmp/redis.conf
              echo "databases 1" >> /tmp/redis.conf
              {{- if .Values.auth.enabled }}
              echo "masterauth ${REDIS_PASSWORD}" >> /tmp/redis.conf
              {{- end }}
              echo "" >> /tmp/redis.conf
              echo "# Increased durability" >> /tmp/redis.conf
              echo "appendonly yes" >> /tmp/redis.conf
              {{- end }}
              {{- else }}
              set -e
              # Get pod ordinal from hostname
              POD_ORDINAL=$(hostname | sed 's/.*-//')
              MY_HOSTNAME=$(hostname)

              touch /tmp/redis.conf

              # Check if we are using ACL authentication
              {{- include "redis.auth.acl.setupScript" (dict "type" "init" "context" .) | nindent 14 }}

              echo "Pod ordinal: $POD_ORDINAL, hostname: $MY_HOSTNAME"

              {{- if eq .Values.architecture "replication" }}
              {{- if .Values.sentinel.enabled }}
              # Add Redis configurations for better Sentinel failover tolerance
              echo "" >> /tmp/redis.conf
              echo "# Configurations for Kubernetes force deletion tolerance" >> /tmp/redis.conf
              echo "min-slaves-to-write 0" >> /tmp/redis.conf
              echo "min-slaves-max-lag 0" >> /tmp/redis.conf

              # Try to determine current master from Sentinel (if any sentinel is available)
              CURRENT_MASTER=""
              SENTINEL_FOUND=false
              SENTINEL_PASSWORD="${REDIS_PASSWORD}"

              # Check if any sentinel is already running and knows the master
              for i in $(seq 0 {{ sub .Values.replicaCount 1 }}); do
                SENTINEL_HOST="{{ include "redis.fullname" . }}-${i}.{{ include "redis.fullname" . }}-headless.{{ include "cloudpirates.namespace" . }}.svc.{{ .Values.clusterDomain }}"
                MASTER_INFO=$(redis-cli -t {{ .Values.sentinel.discoveryTimeout }} -h "${SENTINEL_HOST}" -p {{ .Values.sentinel.port }} {{- if .Values.auth.sentinel }} -a "${REDIS_SENTINEL_PASSWORD:-$REDIS_PASSWORD}"{{- end }}{{- if .Values.tls.enabled }} {{ include "redis.tls.probeArgs" . }}{{- end }} sentinel get-master-addr-by-name {{ .Values.sentinel.masterName }} 2>/dev/null | head -1 || echo "")
                if [ -n "$MASTER_INFO" ] && [ "$MASTER_INFO" != "Could not connect" ]; then
                  CURRENT_MASTER="$MASTER_INFO"
                  SENTINEL_FOUND=true
                  echo "Found current master from sentinel: $CURRENT_MASTER"
                  break
                fi
              done

              # Configuration logic
              if [ "$SENTINEL_FOUND" = true ] && [ -n "$CURRENT_MASTER" ]; then
                # Sentinel knows the master - configure accordingly
                MY_HOSTNAME=$(hostname)
                MY_HOSTNAME_FQDN="${MY_HOSTNAME}.{{ include "redis.fullname" . }}-headless.{{ include "cloudpirates.namespace" . }}.svc.{{ .Values.clusterDomain }}"
                MY_IP=$(hostname -i)

                # Check if I am the master by hostname or IP
                if [ "$MY_IP" = "$CURRENT_MASTER" ] || [ "$MY_HOSTNAME_FQDN" = "$CURRENT_MASTER" ] || [ "$MY_HOSTNAME" = "$CURRENT_MASTER" ]; then
                  echo "I am the current master according to Sentinel"
                else
                  echo "Configuring as replica of current master: $CURRENT_MASTER"
                  echo "replicaof $CURRENT_MASTER {{ if .Values.tls.enabled }}{{ .Values.tls.port }}{{ else }}{{ .Values.service.port }}{{ end }}" >> /tmp/redis.conf
                  {{- if .Values.auth.enabled }}
                  echo "masterauth ${REDIS_PASSWORD}" >> /tmp/redis.conf
                  {{- end }}
                fi
              else
                # No sentinel available - use bootstrap logic
                if [ "$POD_ORDINAL" != "0" ]; then
                  echo "Bootstrap mode: configuring as replica of pod-0"
                  # Use hostname-based replication for better resilience
                  MASTER_HOSTNAME="{{ include "redis.fullname" . }}-0.{{ include "redis.fullname" . }}-headless.{{ include "cloudpirates.namespace" . }}.svc.{{ .Values.clusterDomain }}"
                  echo "replicaof $MASTER_HOSTNAME {{ if .Values.tls.enabled }}{{ .Values.tls.port }}{{ else }}{{ .Values.service.port }}{{ end }}" >> /tmp/redis.conf
                  echo "Bootstrap replica using pod-0 hostname: $MASTER_HOSTNAME"
                  {{- if .Values.auth.enabled }}
                  echo "masterauth ${REDIS_PASSWORD}" >> /tmp/redis.conf
                  {{- end }}
                else
                  echo "Bootstrap mode: pod-0 starting as initial master"
                fi
              fi

              {{ if not .Values.sentinel.config.announceHostnames }}
              # Configure for Sentinel discovery and force deletion tolerance
              # Get IP address based on ipFamily setting
              {{- if eq .Values.ipFamily "ipv4" }}
              MY_IP=$(hostname -i | grep -oE '([0-9]{1,3}\.){3}[0-9]{1,3}' | head -1)
              if [ -z "$MY_IP" ]; then
                echo "Warning: No IPv4 address found, falling back to first available IP"
                MY_IP=$(hostname -i | awk '{print $1}')
              fi
              {{- else if eq .Values.ipFamily "ipv6" }}
              MY_IP=$(hostname -i | grep -oE '([0-9a-f:]+:+)+[0-9a-f]+' | head -1)
              if [ -z "$MY_IP" ]; then
                echo "Warning: No IPv6 address found, falling back to first available IP"
                MY_IP=$(hostname -i | awk '{print $1}')
              fi
              {{- else }}
              # auto: Use the first IP address for dual-stack compatibility
              MY_IP=$(hostname -i | awk '{print $1}')
              {{- end }}

              echo "Using IP address: ${MY_IP}"
              echo "replica-announce-ip ${MY_IP}" >> /tmp/redis.conf
              echo "replica-announce-port {{ if .Values.tls.enabled }}{{ .Values.tls.port }}{{ else }}{{ .Values.service.port }}{{ end }}" >> /tmp/redis.conf
              echo "slave-announce-ip ${MY_IP}" >> /tmp/redis.conf
              echo "slave-announce-port {{ if .Values.tls.enabled }}{{ .Values.tls.port }}{{ else }}{{ .Values.service.port }}{{ end }}" >> /tmp/redis.conf
              {{- else }}
              echo "Using hostname: ${HOSTNAME}.{{ include "redis.fullname" . }}-headless.{{ include "cloudpirates.namespace" . }}.svc.{{ .Values.clusterDomain }}"
              echo "replica-announce-ip ${HOSTNAME}.{{ include "redis.fullname" . }}-headless.{{ include "cloudpirates.namespace" . }}.svc.{{ .Values.clusterDomain }}" >> /tmp/redis.conf
              echo "replica-announce-port {{ if .Values.tls.enabled }}{{ .Values.tls.port }}{{ else }}{{ .Values.service.port }}{{ end }}" >> /tmp/redis.conf
              echo "slave-announce-ip ${HOSTNAME}.{{ include "redis.fullname" . }}-headless.{{ include "cloudpirates.namespace" . }}.svc.{{ .Values.clusterDomain }}" >> /tmp/redis.conf
              echo "slave-announce-port {{ if .Values.tls.enabled }}{{ .Values.tls.port }}{{ else }}{{ .Values.service.port }}{{ end }}" >> /tmp/redis.conf
              {{- end }}

              # Make slaves more eligible for promotion during force deletions
              echo "slave-priority 100" >> /tmp/redis.conf
              echo "replica-read-only yes" >> /tmp/redis.conf
              {{- else }}
              # Replication without Sentinel: pod-0 is always master, others are replicas
              if [ "$POD_ORDINAL" != "0" ]; then
                echo "Configuring as replica of pod-0 (master)"
                MASTER_HOSTNAME="{{ include "redis.fullname" . }}-0.{{ include "redis.fullname" . }}-headless.{{ include "cloudpirates.namespace" . }}.svc.{{ .Values.clusterDomain }}"
                echo "replicaof $MASTER_HOSTNAME {{ if .Values.tls.enabled }}{{ .Values.tls.port }}{{ else }}{{ .Values.service.port }}{{ end }}" >> /tmp/redis.conf
                {{- if .Values.auth.enabled }}
                echo "masterauth ${REDIS_PASSWORD}" >> /tmp/redis.conf
                {{- end }}
                echo "replica-read-only yes" >> /tmp/redis.conf
              else
                echo "Pod-0: Configuring as master"
              fi
              {{- end }}
              {{- else if eq .Values.architecture "cluster" }}
              echo "" >> /tmp/redis.conf
              echo "# Redis Cluster Configuration" >> /tmp/redis.conf
              echo "cluster-enabled yes" >> /tmp/redis.conf
              echo "cluster-config-file nodes.conf" >> /tmp/redis.conf
              echo "cluster-node-timeout {{ .Values.cluster.config.nodeTimeout }}" >> /tmp/redis.conf
              echo "cluster-port {{ .Values.service.clusterPort }}" >> /tmp/redis.conf
              {{- if .Values.cluster.config.requireFullCoverage }}
              echo "cluster-require-full-coverage yes" >> /tmp/redis.conf
              {{- else }}
              echo "cluster-require-full-coverage no" >> /tmp/redis.conf
              {{- end }}
              echo "databases 1" >> /tmp/redis.conf

              {{- if .Values.cluster.announceHostnames }}
              # Hostname-based cluster announcements (recommended for Kubernetes)
              MY_HOSTNAME=$(hostname)
              MY_HOSTNAME_FQDN="${MY_HOSTNAME}.{{ include "redis.fullname" . }}-headless.{{ include "cloudpirates.namespace" . }}.svc.{{ .Values.clusterDomain }}"
              echo "" >> /tmp/redis.conf
              echo "# Cluster hostname-based announcements for Kubernetes resilience" >> /tmp/redis.conf
              echo "cluster-preferred-endpoint-type hostname" >> /tmp/redis.conf
              echo "cluster-announce-hostname ${MY_HOSTNAME_FQDN}" >> /tmp/redis.conf
              echo "cluster-announce-port {{ if .Values.tls.enabled }}{{ .Values.tls.port }}{{ else }}{{ .Values.service.port }}{{ end }}" >> /tmp/redis.conf
              echo "cluster-announce-bus-port {{ .Values.service.clusterPort }}" >> /tmp/redis.conf
              {{- else }}
              # IP-based cluster announcements (default Redis behavior)
              echo "" >> /tmp/redis.conf
              echo "# Cluster IP-based announcements (default behavior)" >> /tmp/redis.conf
              {{- if eq .Values.ipFamily "ipv4" }}
              MY_IP=$(hostname -i | awk '{print $1}' | grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)
              {{- else if eq .Values.ipFamily "ipv6" }}
              MY_IP=$(hostname -i | awk '{print $1}' | grep -E '^[0-9a-fA-F:]+$' | head -n1)
              {{- else }}
              MY_IP=$(hostname -i | awk '{print $1}')
              {{- end }}
              echo "cluster-announce-ip ${MY_IP}" >> /tmp/redis.conf
              echo "cluster-announce-port {{ if .Values.tls.enabled }}{{ .Values.tls.port }}{{ else }}{{ .Values.service.port }}{{ end }}" >> /tmp/redis.conf
              echo "cluster-announce-bus-port {{ .Values.service.clusterPort }}" >> /tmp/redis.conf
              {{- end }}

              {{- if .Values.auth.enabled }}
              echo "masterauth ${REDIS_PASSWORD}" >> /tmp/redis.conf
              {{- end }}
              echo "" >> /tmp/redis.conf
              echo "# Increased durability for cluster mode" >> /tmp/redis.conf
              echo "appendonly yes" >> /tmp/redis.conf
              {{- end }}
              {{- end }}

              {{- if and .Values.auth.enabled (ne .Values.architecture "standalone") }}
              # IMPORTANT: Always add masterauth for non-standalone architectures
              # Even if this pod starts as master, it may become a replica after failover
              # Without masterauth, SLAVEOF commands from sentinel will fail with NOAUTH
              echo "" >> /tmp/redis.conf
              echo "# Authentication for replication (required for failover scenarios)" >> /tmp/redis.conf
              echo "masterauth ${REDIS_PASSWORD}" >> /tmp/redis.conf
              {{- end }}

              # Add user provided settings at the end of file to ensure their precedence
              echo "" >> /tmp/redis.conf
              # If there is existing config map or .Values.config value provided - use it
              if [ -f "{{ include "redis.configFullName" . }}" ]; then
                echo "# Content from provided config" >> /tmp/redis.conf
                cat {{ include "redis.configFullName" . }} >> /tmp/redis.conf
              else
                # Create minimal config if no config exists
                echo "# Default minimal config" >> /tmp/redis.conf
                cat >> /tmp/redis.conf << EOF
              bind * -::*
              port {{ .Values.service.port }}
              EOF
              fi

              {{- if .Values.extraConfig }}
              # Add extra configuration from values.yaml
              echo "" >> /tmp/redis.conf
              echo "# Extra configuration from values.yaml" >> /tmp/redis.conf
              cat >> /tmp/redis.conf << 'EOF'
              {{- .Values.extraConfig | nindent 14 }}
              EOF
              {{- end }}
          {{- if and .Values.auth.enabled (not .Values.auth.acl.enabled) }}
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "redis.secretName" . }}
                  key: {{ include "redis.secretPasswordKey" . }}
          {{- end }}
          resources: {{- toYaml .Values.initContainer.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: {{ .Values.config.mountPath }}
            - name: redis-config
              mountPath: /tmp
            {{- if and .Values.auth.acl.enabled .Values.auth.acl.existingSecret }}
            - name: acl-file
              mountPath: {{ include "redis.auth.acl.path" . }}
              subPath: {{ include "redis.auth.acl.file" . }}
              readOnly: true
            {{- end }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext: {{ include "cloudpirates.renderContainerSecurityContext" . | nindent 12 }}
          image: {{ include "redis.image" . | quote }}
          imagePullPolicy: {{ include "cloudpirates.imagePullPolicy" (dict "image" .Values.image) }}
          command:
            - /bin/sh
            - -c
            - |
              {{- if (list "replication" "cluster" | has .Values.architecture) }}
              CONFIG_FILE="/tmp/redis.conf"
              {{- else }}
              CONFIG_FILE="{{ include "redis.configFullName" . }}"
              {{- end }}
              {{- if gt (int .Values.cluster.startupSleepTime) 0 }}
              echo "Sleeping for {{ .Values.cluster.startupSleepTime }}s (cluster.startupSleepTime configured)..."
              sleep {{ .Values.cluster.startupSleepTime }}
              {{- end }}

              redis-server "$CONFIG_FILE" {{- if and .Values.auth.enabled (not .Values.auth.acl.enabled) }} --requirepass "${REDIS_PASSWORD}" {{- end }} {{- range .Values.extraFlags }} {{ . }}{{- end }}
          ports:
            - name: redis
              containerPort: {{ if .Values.tls.enabled }}{{ .Values.tls.port }}{{ else }}6379{{ end }}
              protocol: TCP
            {{- if eq .Values.architecture "cluster" }}
            - name: cluster
              containerPort: {{ .Values.service.clusterPort }}
              protocol: TCP
            {{- end }}
            {{- range .Values.extraPorts }}
            - containerPort: {{ .containerPort }}
              name: {{ .name }}
            {{- end }}
          {{- if or .Values.auth.enabled .Values.extraEnvVars }}
          env:
            {{- if and .Values.auth.enabled (not .Values.auth.acl.enabled) }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "redis.secretName" . }}
                  key: {{ include "redis.secretPasswordKey" . }}
            - name: REDISCLI_AUTH
              valueFrom:
                secretKeyRef:
                  name: {{ include "redis.secretName" . }}
                  key: {{ include "redis.secretPasswordKey" . }}
            {{- end }}
            {{- with .Values.extraEnvVars }}
{{ toYaml . | indent 12 }}
            {{- end }}
          {{- end }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  {{- include "redis.auth.acl.setupScript" (dict "type" "probe" "context" .) | nindent 18 }}
                  redis-cli -h {{ if eq .Values.ipFamily "ipv6" }}"::1"{{ else }}"127.0.0.1"{{ end }}{{- if .Values.tls.enabled }} -p {{ .Values.tls.port }} {{ include "redis.tls.probeArgs" . }}{{- end }} ping
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
            successThreshold: {{ .Values.livenessProbe.successThreshold }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  {{- include "redis.auth.acl.setupScript" (dict "type" "probe" "context" .) | nindent 18 }}
                  redis-cli -h {{ if eq .Values.ipFamily "ipv6" }}"::1"{{ else }}"127.0.0.1"{{ end }}{{- if .Values.tls.enabled }} -p {{ .Values.tls.port }} {{ include "redis.tls.probeArgs" . }}{{- end }} ping {{ if and .Values.sentinel.enabled (eq .Values.architecture "replication") }} | grep -q PONG{{ end }}
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
            successThreshold: {{ .Values.readinessProbe.successThreshold }}
          {{- end }}
          {{- if .Values.startupProbe.enabled }}
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  {{- include "redis.auth.acl.setupScript" (dict "type" "probe" "context" .) | nindent 18 }}
                  redis-cli -h {{ if eq .Values.ipFamily "ipv6" }}"::1"{{ else }}"127.0.0.1"{{ end }}{{- if .Values.tls.enabled }} -p {{ .Values.tls.port }} {{ include "redis.tls.probeArgs" . }}{{- end }} ping
            initialDelaySeconds: {{ .Values.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.startupProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.startupProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.startupProbe.failureThreshold }}
            successThreshold: {{ .Values.startupProbe.successThreshold }}
          {{- end }}
          {{- if or (and .Values.sentinel.enabled (eq .Values.architecture "replication")) .Values.customScripts.postStart.enabled .Values.customScripts.preStop.enabled }}
          lifecycle:
            {{- if .Values.customScripts.postStart.enabled }}
            postStart:
              exec:
                command:
                  {{- toYaml .Values.customScripts.postStart.command | nindent 18 }}
            {{- end }}
            {{- if .Values.customScripts.preStop.enabled }}
            preStop:
              exec:
                command:
                  {{- toYaml .Values.customScripts.preStop.command | nindent 18 }}
            {{- else if and .Values.sentinel.enabled (eq .Values.architecture "replication") }}
            preStop:
              exec:
                command:
                  - /bin/bash
                  - /scripts/prestop.sh
            {{- end }}
          {{- end }}
          resources: {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
              {{- if .Values.persistence.subPath }}
              subPath: {{ .Values.persistence.subPath }}
              {{- end }}
            {{- if (list "replication" "cluster" | has .Values.architecture) }}
            - name: redis-config
              mountPath: /tmp
            {{- if .Values.sentinel.enabled }}
            - name: prestop-script
              mountPath: /scripts
              readOnly: true
            {{- end }}
            {{- end }}
            {{- if or .Values.config.content .Values.config.existingConfigmap }}
            - name: config
              mountPath: {{ .Values.config.mountPath }}
            {{- end }}
            {{- if .Values.tls.enabled }}
            - name: tls-certs
              mountPath: /etc/redis/tls
              readOnly: true
            {{- if .Values.tls.client.existingSecret }}
            - name: tls-client-certs
              mountPath: /etc/redis/tls-client
              readOnly: true
            {{- end }}
            {{- end }}
            {{- if and .Values.auth.acl.enabled .Values.auth.acl.existingSecret }}
            - name: acl-file
              mountPath: {{ include "redis.auth.acl.path" . }}
              subPath: {{ include "redis.auth.acl.file" . }}
              readOnly: true
            {{- end }}
            {{- if .Values.extraVolumeMounts }}
            {{- toYaml .Values.extraVolumeMounts | nindent 12 }}
            {{- end }}
        {{- if and .Values.sentinel.enabled (eq .Values.architecture "replication") }}
        - name: sentinel
          securityContext: {{ include "cloudpirates.renderContainerSecurityContext" . | nindent 12 }}
          image: {{ include "redis.sentinel.image" . | quote }}
          imagePullPolicy: {{ include "cloudpirates.imagePullPolicy" (dict "image" .Values.sentinel.image) }}
          volumeMounts:
            - name: sentinel-config
              mountPath: /tmp
            - name: prestop-script
              mountPath: /scripts
              readOnly: true
            {{- if and .Values.auth.acl.enabled .Values.auth.acl.existingSecret }}
            - name: acl-file
              mountPath: {{ include "redis.auth.acl.path" . }}
              subPath: {{ include "redis.auth.acl.file" . }}
              readOnly: true
            {{- end }}
          {{- if .Values.tls.enabled }}
            - name: tls-certs
              mountPath: /etc/redis/tls
              readOnly: true
            {{- if .Values.tls.client.existingSecret }}
            - name: tls-client-certs
              mountPath: /etc/redis/tls-client
              readOnly: true
            {{- end }}
          {{- end }}
          {{- if .Values.sentinel.extraVolumeMounts }}
            {{- toYaml .Values.sentinel.extraVolumeMounts | nindent 12 }}
          {{- end }}
          command:
            - /bin/sh
            - -c
            - |
              {{- if $useDeployment }}
              set -e

              # Wait for Redis to be ready
              echo "Waiting for Redis to start..."
              {{- if eq .Values.ipFamily "ipv6" }}
              REDIS_HOST="::1"
              {{- else }}
              REDIS_HOST="127.0.0.1"
              {{- end }}
              _wait=0
              while ! redis-cli {{- if .Values.auth.enabled }} -a "${REDIS_PASSWORD}"{{- end }} -h "${REDIS_HOST}" -p {{ if .Values.tls.enabled }}{{ .Values.tls.port }}{{ else }}{{ .Values.service.port }}{{ end }}{{- if .Values.tls.enabled }} --tls --cert /etc/redis/tls/{{ .Values.tls.certFilename }} --key /etc/redis/tls/{{ .Values.tls.certKeyFilename }} --cacert /etc/redis/tls/{{ .Values.tls.certCAFilename }}{{- end }} ping >/dev/null 2>&1; do
                _wait=$((_wait + 1))
                [ $_wait -ge 60 ] && { echo "Timeout: Redis not ready after 60s"; exit 1; }
                sleep 1
              done
              echo "Redis is ready"

              # Deployment mode: retry sentinel discovery, then IP-based election
              MASTER_HOST=""
              SENTINEL_FOUND_MASTER=false
              MY_IP=$(hostname -i | awk '{print $1}')
              HEADLESS_SVC="{{ include "redis.fullname" . }}-headless.{{ include "cloudpirates.namespace" . }}.svc.{{ .Values.clusterDomain }}"

              echo "Deployment mode: searching for existing sentinel..."
              for retry in $(seq 1 5); do
                for SENTINEL_IP in $(getent hosts "${HEADLESS_SVC}" 2>/dev/null | awk '{print $1}' | sort -u); do
                  [ "$SENTINEL_IP" = "$MY_IP" ] && continue
                  EXISTING_MASTER=$(redis-cli --no-auth-warning -h "${SENTINEL_IP}" -p {{ .Values.sentinel.port }} {{- if .Values.auth.sentinel }} -a "${REDIS_PASSWORD}"{{- end }}{{- if .Values.tls.enabled }} {{ include "redis.tls.probeArgs" . }}{{- end }} sentinel get-master-addr-by-name {{ .Values.sentinel.masterName }} 2>/dev/null | head -1 || echo "")
                  # Validate response is an IP address (reject error messages like "NOAUTH Authentication required.")
                  # Supports both IPv4 (1.2.3.4) and IPv6 (fd00::1). Valid IPs never contain spaces.
                  if [ -n "$EXISTING_MASTER" ] && echo "$EXISTING_MASTER" | grep -qE '^[0-9a-f.:]+$'; then
                    MASTER_HOST="$EXISTING_MASTER"
                    SENTINEL_FOUND_MASTER=true
                    echo "Found master via sentinel at ${SENTINEL_IP}: $MASTER_HOST"
                    break 2
                  elif [ -n "$EXISTING_MASTER" ]; then
                    echo "WARNING: Sentinel at ${SENTINEL_IP} returned invalid master address: $EXISTING_MASTER (ignoring)"
                  fi
                done
                [ $retry -lt 5 ] && sleep 3
              done

              # Verify master reachability: after scale-down or node failure, sentinel may report a stale master.
              # If unreachable, fall back to bootstrap election so the cluster can re-form.
              if [ "$SENTINEL_FOUND_MASTER" = true ] && [ -n "$MASTER_HOST" ]; then
                if ! redis-cli --no-auth-warning -h "$MASTER_HOST" -p {{ if .Values.tls.enabled }}{{ .Values.tls.port }}{{ else }}{{ .Values.service.port }}{{ end }} {{- if .Values.auth.enabled }} -a "${REDIS_PASSWORD}"{{- end }}{{- if .Values.tls.enabled }} {{ include "redis.tls.probeArgs" . }}{{- end }} -t 2 PING >/dev/null 2>&1; then
                  echo "WARNING: Sentinel's master $MASTER_HOST is unreachable, falling back to bootstrap election"
                  SENTINEL_FOUND_MASTER=false
                  MASTER_HOST=""
                else
                  echo "Master $MASTER_HOST is reachable"
                fi
              fi

              if [ "$SENTINEL_FOUND_MASTER" = false ]; then
                # No sentinel found or master unreachable: check for existing Redis master, then elect by lowest IP
                echo "No sentinel/reachable master found, discovering peers..."
                for i in $(seq 1 10); do
                  IP_COUNT=$(getent hosts "${HEADLESS_SVC}" 2>/dev/null | awk '{print $1}' | sort -u | wc -l)
                  [ "$IP_COUNT" -ge 2 ] && break
                  sleep 2
                done
                ALL_IPS=$(getent hosts "${HEADLESS_SVC}" 2>/dev/null | awk '{print $1}' | sort -Vu)
                echo "Discovered peers: $(echo $ALL_IPS | tr '\n' ' ')"

                # Check if any peer is already a running Redis master (handles rolling updates)
                FOUND_MASTER_IP=""
                for PEER_IP in $ALL_IPS; do
                  [ "$PEER_IP" = "$MY_IP" ] && continue
                  if redis-cli --no-auth-warning -h "$PEER_IP" -p {{ if .Values.tls.enabled }}{{ .Values.tls.port }}{{ else }}{{ .Values.service.port }}{{ end }} {{- if .Values.auth.enabled }} -a "${REDIS_PASSWORD}"{{- end }}{{- if .Values.tls.enabled }} {{ include "redis.tls.probeArgs" . }}{{- end }} -t 2 info replication 2>/dev/null | grep -q "role:master"; then
                    FOUND_MASTER_IP="$PEER_IP"
                    echo "Found existing Redis master at $PEER_IP"
                    break
                  fi
                done

                if [ -n "$FOUND_MASTER_IP" ]; then
                  MASTER_HOST="$FOUND_MASTER_IP"
                  echo "Monitoring existing master: $MASTER_HOST"
                else
                  # No existing master: elect by lowest IP
                  LOWEST_IP=$(echo "$ALL_IPS" | head -1)
                  if [ -z "$LOWEST_IP" ] || [ "$MY_IP" = "$LOWEST_IP" ]; then
                    MASTER_HOST="$MY_IP"
                    echo "Bootstrap: monitoring self as master (lowest IP: ${MY_IP})"
                  else
                    echo "Bootstrap: waiting for sentinel at lowest-IP pod ${LOWEST_IP}..."
                    _wait=0
                    while true; do
                      MASTER_HOST=$(redis-cli --no-auth-warning -h "${LOWEST_IP}" -p {{ .Values.sentinel.port }} {{- if .Values.auth.sentinel }} -a "${REDIS_PASSWORD}"{{- end }}{{- if .Values.tls.enabled }} {{ include "redis.tls.probeArgs" . }}{{- end }} sentinel get-master-addr-by-name {{ .Values.sentinel.masterName }} 2>/dev/null | head -1 || echo "")
                      # Validate response is an IP address (IPv4 or IPv6)
                      if [ -n "$MASTER_HOST" ] && echo "$MASTER_HOST" | grep -qE '^[0-9a-f.:]+$'; then
                        break
                      fi
                      MASTER_HOST=""
                      _wait=$((_wait + 1))
                      [ $_wait -ge 60 ] && { echo "Timeout waiting for sentinel at ${LOWEST_IP}, using IP as master"; MASTER_HOST="$LOWEST_IP"; break; }
                      sleep 1
                    done
                    echo "Bootstrap: got master from lowest-IP sentinel: $MASTER_HOST"
                    # Verify the reported master is reachable (may be stale after scale-down or rolling update)
                    if ! redis-cli --no-auth-warning -h "$MASTER_HOST" -p {{ if .Values.tls.enabled }}{{ .Values.tls.port }}{{ else }}{{ .Values.service.port }}{{ end }} {{- if .Values.auth.enabled }} -a "${REDIS_PASSWORD}"{{- end }}{{- if .Values.tls.enabled }} {{ include "redis.tls.probeArgs" . }}{{- end }} -t 2 PING >/dev/null 2>&1; then
                      echo "WARNING: Master $MASTER_HOST from lowest-IP sentinel is unreachable, using lowest IP ${LOWEST_IP} as master"
                      MASTER_HOST="$LOWEST_IP"
                    fi
                  fi
                fi

              fi

              # Ensure local Redis topology matches the discovered master.
              # Sentinel container may restart without Redis restarting (init container won't re-run),
              # so Redis instances may still replicate from a dead master after scale-down.
              if [ -n "$MASTER_HOST" ]; then
                CURRENT_MASTER=$(redis-cli {{- if .Values.auth.enabled }} -a "${REDIS_PASSWORD}"{{- end }} --no-auth-warning -h "${REDIS_HOST}" -p {{ if .Values.tls.enabled }}{{ .Values.tls.port }}{{ else }}{{ .Values.service.port }}{{ end }}{{- if .Values.tls.enabled }} {{ include "redis.tls.probeArgs" . }}{{- end }} info replication 2>/dev/null | tr -d '\r' | awk -F: '/^master_host:/{print $2}')
                CURRENT_ROLE=$(redis-cli {{- if .Values.auth.enabled }} -a "${REDIS_PASSWORD}"{{- end }} --no-auth-warning -h "${REDIS_HOST}" -p {{ if .Values.tls.enabled }}{{ .Values.tls.port }}{{ else }}{{ .Values.service.port }}{{ end }}{{- if .Values.tls.enabled }} {{ include "redis.tls.probeArgs" . }}{{- end }} role 2>/dev/null | head -1)
                if [ "$MASTER_HOST" = "$MY_IP" ] && [ "$CURRENT_ROLE" != "master" ]; then
                  echo "Promoting local Redis to master (REPLICAOF NO ONE)..."
                  redis-cli {{- if .Values.auth.enabled }} -a "${REDIS_PASSWORD}"{{- end }} --no-auth-warning -h "${REDIS_HOST}" -p {{ if .Values.tls.enabled }}{{ .Values.tls.port }}{{ else }}{{ .Values.service.port }}{{ end }}{{- if .Values.tls.enabled }} {{ include "redis.tls.probeArgs" . }}{{- end }} REPLICAOF NO ONE 2>/dev/null && echo "Local Redis promoted to master" || echo "Warning: REPLICAOF NO ONE failed"
                elif [ "$MASTER_HOST" != "$MY_IP" ] && [ "$CURRENT_MASTER" != "$MASTER_HOST" ]; then
                  echo "Reconfiguring local Redis to replicate from master ${MASTER_HOST} (was: ${CURRENT_MASTER:-none})..."
                  redis-cli {{- if .Values.auth.enabled }} -a "${REDIS_PASSWORD}"{{- end }} --no-auth-warning -h "${REDIS_HOST}" -p {{ if .Values.tls.enabled }}{{ .Values.tls.port }}{{ else }}{{ .Values.service.port }}{{ end }}{{- if .Values.tls.enabled }} {{ include "redis.tls.probeArgs" . }}{{- end }} REPLICAOF "$MASTER_HOST" {{ if .Values.tls.enabled }}{{ .Values.tls.port }}{{ else }}{{ .Values.service.port }}{{ end }} 2>/dev/null && echo "Local Redis now replicating from $MASTER_HOST" || echo "Warning: REPLICAOF failed"
                fi
              fi

              # Get IP address based on ipFamily setting
              {{- if eq .Values.ipFamily "ipv4" }}
              SENTINEL_IP=$(hostname -i | grep -oE '([0-9]{1,3}\.){3}[0-9]{1,3}' | head -1)
              if [ -z "$SENTINEL_IP" ]; then
                echo "Warning: No IPv4 address found, falling back to first available IP"
                SENTINEL_IP=$(hostname -i | awk '{print $1}')
              fi
              {{- else if eq .Values.ipFamily "ipv6" }}
              SENTINEL_IP=$(hostname -i | grep -oE '([0-9a-f:]+:+)+[0-9a-f]+' | head -1)
              if [ -z "$SENTINEL_IP" ]; then
                echo "Warning: No IPv6 address found, falling back to first available IP"
                SENTINEL_IP=$(hostname -i | awk '{print $1}')
              fi
              {{- else }}
              # auto: Use the first IP address for dual-stack compatibility
              SENTINEL_IP=$(hostname -i | awk '{print $1}')
              {{- end }}
              echo "Sentinel using IP address: ${SENTINEL_IP}"

              # Create Sentinel config
              cat > /tmp/sentinel.conf << EOF
              # Enable TLS in Sentinel
              {{- if .Values.tls.enabled }}
              port 0
              tls-port {{ .Values.sentinel.port }}
              tls-replication yes
              tls-cert-file /etc/redis/tls/{{ .Values.tls.certFilename }}
              tls-key-file /etc/redis/tls/{{ .Values.tls.certKeyFilename }}
              tls-ca-cert-file /etc/redis/tls/{{ .Values.tls.certCAFilename }}
              {{- if .Values.tls.authClients }}
              tls-auth-clients yes
              {{- else }}
              tls-auth-clients no
              {{- end }}
              {{- else }}
              port {{ .Values.sentinel.port }}
              {{- end }}
              bind * -::*
              sentinel resolve-hostnames yes
              sentinel announce-hostnames no
              sentinel monitor {{ .Values.sentinel.masterName }} ${MASTER_HOST} {{ if .Values.tls.enabled }}{{ .Values.tls.port }}{{ else }}{{ .Values.service.port }}{{ end }} {{ .Values.sentinel.quorum }}
              sentinel down-after-milliseconds {{ .Values.sentinel.masterName }} {{ .Values.sentinel.downAfterMilliseconds }}
              sentinel failover-timeout {{ .Values.sentinel.masterName }} {{ .Values.sentinel.failoverTimeout }}
              sentinel parallel-syncs {{ .Values.sentinel.masterName }} {{ .Values.sentinel.parallelSyncs }}
              {{- if .Values.auth.enabled }}
              sentinel auth-pass {{ .Values.sentinel.masterName }} "${REDIS_PASSWORD}"
              {{- end }}
              {{- if .Values.auth.sentinel }}
              requirepass "${REDIS_PASSWORD}"
              {{- end }}
              # Make automatic failover more aggressive for Kubernetes force deletions
              sentinel deny-scripts-reconfig yes
              protected-mode no
              sentinel announce-ip ${SENTINEL_IP}
              sentinel announce-port {{ .Values.sentinel.port }}
              logfile ""
              loglevel {{ .Values.sentinel.config.loglevel }}
              EOF

              # Note: In deployment mode, known-sentinel entries are intentionally omitted.
              # Sentinel peers discover each other organically via the __sentinel__:hello
              # pub/sub channel on shared Redis instances. Static known-sentinel entries
              # from the headless service DNS accumulate stale entries during rolling updates,
              # inflating quorum requirements and blocking failover.

              {{- if eq .Values.sentinel.config.loglevel "debug" }}
              echo "Starting Sentinel with config:"
              cat /tmp/sentinel.conf
              {{- else }}
              echo "Starting Sentinel..."
              {{- end }}

              # Start sentinel in background for one-time stale peer cleanup
              redis-sentinel /tmp/sentinel.conf &
              SENTINEL_PID=$!

              # Wait for sentinel to be ready
              _sentinel_wait=0
              while ! redis-cli --no-auth-warning {{- if .Values.auth.sentinel }} -a "${REDIS_PASSWORD}"{{- end }} -p {{ .Values.sentinel.port }}{{- if .Values.tls.enabled }} {{ include "redis.tls.probeArgs" . }}{{- end }} PING 2>/dev/null | grep -q PONG; do
                _sentinel_wait=$((_sentinel_wait + 1))
                [ $_sentinel_wait -ge 30 ] && break
                sleep 1
              done
              echo "Sentinel started"

              # One-time stale sentinel cleanup (runs once in background, then exits).
              # After pub/sub peer discovery (~10s), checks for s_down sentinel entries
              # and resets local + peer sentinels if stale entries exist. SENTINEL RESET
              # clears known sentinels/slaves; live ones re-discover via pub/sub within ~2s.
              {
                sleep 10
                echo "Running one-time stale sentinel cleanup..."
                for TARGET in 127.0.0.1 $(getent hosts "${HEADLESS_SVC}" 2>/dev/null | awk '{print $1}' | sort -u | grep -v "^${MY_IP}$"); do
                  HAS_STALE=$(redis-cli --no-auth-warning --raw {{- if .Values.auth.sentinel }} -a "${REDIS_PASSWORD}"{{- end }} -h "$TARGET" -p {{ .Values.sentinel.port }}{{- if .Values.tls.enabled }} {{ include "redis.tls.probeArgs" . }}{{- end }} sentinel sentinels {{ .Values.sentinel.masterName }} 2>/dev/null | tr -d '\r' | awk '
                    /^flags$/ { getline; if ($0 ~ /s_down/) { print "yes"; exit } }
                  ')
                  if [ "$HAS_STALE" = "yes" ]; then
                    redis-cli --no-auth-warning {{- if .Values.auth.sentinel }} -a "${REDIS_PASSWORD}"{{- end }} -h "$TARGET" -p {{ .Values.sentinel.port }}{{- if .Values.tls.enabled }} {{ include "redis.tls.probeArgs" . }}{{- end }} SENTINEL RESET {{ .Values.sentinel.masterName }} >/dev/null 2>&1 && echo "Reset sentinel state on $TARGET (had stale peers)"
                  fi
                done
                echo "Stale sentinel cleanup complete"
              } &

              # Return to foreground
              wait $SENTINEL_PID
              {{- else }}
              set -e

              {{- include "redis.auth.acl.setupScript" (dict "type" "sentinel" "context" .) | nindent 14 }}

              # Wait for Redis to be ready
              echo "Waiting for Redis to start..."
              {{- if eq .Values.ipFamily "ipv6" }}
              REDIS_HOST="::1"
              {{- else }}
              REDIS_HOST="127.0.0.1"
              {{- end }}
              while ! redis-cli {{- if .Values.auth.enabled }} -a "${REDIS_PASSWORD}"{{- end }} -h "${REDIS_HOST}" -p {{ if .Values.tls.enabled }}{{ .Values.tls.port }}{{ else }}{{ .Values.service.port }}{{ end }}{{- if .Values.tls.enabled }} {{ include "redis.tls.probeArgs" . }}{{- end }} ping >/dev/null 2>&1; do
                sleep 1
              done
              echo "Redis is ready"

              # Determine initial master: query existing Sentinels first, fallback to pod-0 only for bootstrap
              POD_ORDINAL=$(hostname | sed 's/.*-//')
              MASTER_HOST=""
              SENTINEL_FOUND_MASTER=false

              # First priority: Try to query other sentinels to find the current master
              echo "Checking existing Sentinels for current master..."
              for i in $(seq 0 {{ sub .Values.replicaCount 1 }}); do
                if [ "$i" != "$POD_ORDINAL" ]; then
                  SENTINEL_HOST="{{ include "redis.fullname" . }}-${i}.{{ include "redis.fullname" . }}-headless.{{ include "cloudpirates.namespace" . }}.svc.{{ .Values.clusterDomain }}"
                  EXISTING_MASTER=$(redis-cli -t {{ .Values.sentinel.discoveryTimeout }} -h "${SENTINEL_HOST}" -p {{ .Values.sentinel.port }} {{- if .Values.auth.sentinel }} -a "${REDIS_SENTINEL_PASSWORD:-$REDIS_PASSWORD}"{{- end }}{{- if .Values.tls.enabled }} {{ include "redis.tls.probeArgs" . }}{{- end }} sentinel get-master-addr-by-name {{ .Values.sentinel.masterName }} 2>/dev/null | head -1 || echo "")
                  if [ -n "$EXISTING_MASTER" ] && [ "$EXISTING_MASTER" != "Could not connect" ]; then
                    MASTER_HOST="$EXISTING_MASTER"
                    SENTINEL_FOUND_MASTER=true
                    echo "Found current master via sentinel: $MASTER_HOST"
                    break
                  fi
                fi
              done

              # Second priority: If no Sentinels found master, check if any Redis instance claims to be master
              if [ "$SENTINEL_FOUND_MASTER" = false ]; then
                echo "No Sentinels available, checking Redis instances directly..."
                for i in $(seq 0 {{ sub .Values.replicaCount 1 }}); do
                  REDIS_HOST="{{ include "redis.fullname" . }}-${i}.{{ include "redis.fullname" . }}-headless.{{ include "cloudpirates.namespace" . }}.svc.{{ .Values.clusterDomain }}"
                  ROLE_INFO=$(redis-cli -t {{ .Values.sentinel.discoveryTimeout }} -h "${REDIS_HOST}" -p {{ if .Values.tls.enabled }}{{ .Values.tls.port }}{{ else }}{{ .Values.service.port }}{{ end }} {{- if .Values.auth.enabled }} -a "${REDIS_PASSWORD}"{{- end }}{{- if .Values.tls.enabled }} {{ include "redis.tls.probeArgs" . }}{{- end }} info replication 2>/dev/null | grep "role:master" || echo "")
                  if [ -n "$ROLE_INFO" ]; then
                    MASTER_HOST="$REDIS_HOST"
                    echo "Found current master by role check: $MASTER_HOST"
                    break
                  fi
                done
              fi

              # Final fallback: Use pod-0 hostname for initial bootstrap only
              if [ -z "$MASTER_HOST" ]; then
                MASTER_HOST="{{ include "redis.fullname" . }}-0.{{ include "redis.fullname" . }}-headless.{{ include "cloudpirates.namespace" . }}.svc.{{ .Values.clusterDomain }}"
                echo "No existing master found, using pod-0 for initial bootstrap: $MASTER_HOST"
              fi

              # Get IP address based on ipFamily setting
              {{- if eq .Values.ipFamily "ipv4" }}
              SENTINEL_IP=$(hostname -i | grep -oE '([0-9]{1,3}\.){3}[0-9]{1,3}' | head -1)
              if [ -z "$SENTINEL_IP" ]; then
                echo "Warning: No IPv4 address found, falling back to first available IP"
                SENTINEL_IP=$(hostname -i | awk '{print $1}')
              fi
              {{- else if eq .Values.ipFamily "ipv6" }}
              SENTINEL_IP=$(hostname -i | grep -oE '([0-9a-f:]+:+)+[0-9a-f]+' | head -1)
              if [ -z "$SENTINEL_IP" ]; then
                echo "Warning: No IPv6 address found, falling back to first available IP"
                SENTINEL_IP=$(hostname -i | awk '{print $1}')
              fi
              {{- else }}
              # auto: Use the first IP address for dual-stack compatibility
              SENTINEL_IP=$(hostname -i | awk '{print $1}')
              {{- end }}
              echo "Sentinel using IP address: ${SENTINEL_IP}"

              # Create Sentinel config
              cat > /tmp/sentinel.conf << EOF
              # Enable TLS in Sentinel
              {{- if .Values.tls.enabled }}
              port 0
              tls-port {{ .Values.sentinel.port }}
              tls-replication yes
              tls-cert-file /etc/redis/tls/{{ .Values.tls.certFilename }}
              tls-key-file /etc/redis/tls/{{ .Values.tls.certKeyFilename }}
              tls-ca-cert-file /etc/redis/tls/{{ .Values.tls.certCAFilename }}
              {{- if .Values.tls.authClients }}
              tls-auth-clients yes
              {{- else }}
              tls-auth-clients no
              {{- end }}
              {{- else }}
              port {{ .Values.sentinel.port }}
              {{- end }}
              bind * -::*
              # Enable hostname resolution for Redis Sentinel
              sentinel resolve-hostnames yes
              sentinel announce-hostnames yes
              sentinel monitor {{ .Values.sentinel.masterName }} ${MASTER_HOST} {{ if .Values.tls.enabled }}{{ .Values.tls.port }}{{ else }}{{ .Values.service.port }}{{ end }} {{ .Values.sentinel.quorum }}
              sentinel down-after-milliseconds {{ .Values.sentinel.masterName }} {{ .Values.sentinel.downAfterMilliseconds }}
              sentinel failover-timeout {{ .Values.sentinel.masterName }} {{ .Values.sentinel.failoverTimeout }}
              sentinel parallel-syncs {{ .Values.sentinel.masterName }} {{ .Values.sentinel.parallelSyncs }}
              {{- if .Values.auth.enabled }}
              sentinel auth-pass {{ .Values.sentinel.masterName }} "${REDIS_PASSWORD}"
              {{- end }}
              {{- if .Values.auth.sentinel }}
              requirepass "${REDIS_SENTINEL_PASSWORD:-$REDIS_PASSWORD}"
              {{- end }}
              # Make automatic failover more aggressive for Kubernetes force deletions
              sentinel deny-scripts-reconfig yes
              # Fix leader election issues during force deletions
              protected-mode no
              # CRITICAL: Track disconnected slaves for force deletion tolerance
              sentinel_link_buffer_size 32768
              # Allow sentinels to discover each other
              {{ if .Values.sentinel.config.announceHostnames }}
              sentinel announce-ip ${HOSTNAME}.{{ include "redis.fullname" . }}-headless.{{ include "cloudpirates.namespace" . }}.svc.{{ .Values.clusterDomain }}
              {{- else }}
              sentinel announce-ip ${SENTINEL_IP}
              {{- end }}
              sentinel announce-port {{ .Values.sentinel.port }}
              logfile ""
              loglevel {{ .Values.sentinel.config.loglevel }}
              EOF

              # Add known sentinels to help with discovery (using hostnames for resilience)
              for i in $(seq 0 {{ sub .Values.replicaCount 1 }}); do
                if [ "$i" != "$POD_ORDINAL" ]; then
                  SENTINEL_HOST="{{ include "redis.fullname" . }}-${i}.{{ include "redis.fullname" . }}-headless.{{ include "cloudpirates.namespace" . }}.svc.{{ .Values.clusterDomain }}"
                  # Test if the host is resolvable before adding
                  if getent hosts "$SENTINEL_HOST" >/dev/null 2>&1; then
                    SENTINEL_IP=$(getent hosts "$SENTINEL_HOST" | awk '{print $1}' | head -1)
                    if [ -n "$SENTINEL_IP" ]; then
                      echo "sentinel known-sentinel {{ .Values.sentinel.masterName }} ${SENTINEL_IP} {{ .Values.sentinel.port }}" >> /tmp/sentinel.conf
                    fi
                  fi
                fi
              done

              {{- if eq .Values.sentinel.config.loglevel "debug" }}
              echo "Starting Sentinel with config:"
              cat /tmp/sentinel.conf
              {{- else }}
              echo "Starting Sentinel..."
              {{- end }}

              redis-sentinel /tmp/sentinel.conf
              {{- end }}
          ports:
            - name: sentinel
              containerPort: {{ .Values.sentinel.port }}
              protocol: TCP
          {{- if .Values.sentinel.readinessProbe.enabled }}
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  {{- include "redis.auth.acl.setupScript" (dict "type" "sentinel-probe" "context" .) | nindent 18 }}
                  redis-cli -h {{ if eq .Values.ipFamily "ipv6" }}"::1"{{ else }}"127.0.0.1"{{ end }} -p {{ .Values.sentinel.port }} {{ if .Values.auth.sentinel }}-a "${REDIS_PASSWORD}"{{- end }} {{ if .Values.tls.enabled }}{{ include "redis.tls.probeArgs" . }}{{- end }} ping | grep -q PONG
            initialDelaySeconds: {{ .Values.sentinel.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.sentinel.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.sentinel.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.sentinel.readinessProbe.failureThreshold }}
            successThreshold: {{ .Values.sentinel.readinessProbe.successThreshold }}
          {{- end }}
          {{- if .Values.sentinel.livenessProbe.enabled }}
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  {{- include "redis.auth.acl.setupScript" (dict "type" "sentinel-probe" "context" .) | nindent 18 }}
                  redis-cli -h {{ if eq .Values.ipFamily "ipv6" }}"::1"{{ else }}"127.0.0.1"{{ end }} -p {{ .Values.sentinel.port }} {{ if .Values.auth.sentinel }}-a "${REDIS_PASSWORD}"{{- end }} {{ if .Values.tls.enabled }}{{ include "redis.tls.probeArgs" . }}{{- end }} ping | grep -q PONG || exit 1
                  {{- if $useDeployment }}
                  # Fail probe if monitored master is unreachable (s_down flag file set by
                  # background check). Triggers container restart → re-bootstrap with live master.
                  # Normal failover completes in <20s; failureThreshold (6 * 10s = 60s) prevents
                  # restart during transient failovers. Flag file adds 1-cycle (10s) delay.
                  [ -f /tmp/sentinel-master-sdown ] && exit 1
                  {
                  MASTER_FLAGS=$(redis-cli --no-auth-warning --raw {{- if .Values.auth.sentinel }} -a "${REDIS_PASSWORD}"{{- end }} -p {{ .Values.sentinel.port }}{{- if .Values.tls.enabled }} {{ include "redis.tls.probeArgs" . }}{{- end }} sentinel master {{ .Values.sentinel.masterName }} 2>/dev/null | tr -d '\r' | awk '/^flags$/{getline; print}')
                  if echo "$MASTER_FLAGS" | grep -q "s_down"; then touch /tmp/sentinel-master-sdown; else rm -f /tmp/sentinel-master-sdown; fi
                  } &
                  {{- end }}
            initialDelaySeconds: {{ .Values.sentinel.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.sentinel.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.sentinel.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.sentinel.livenessProbe.failureThreshold }}
            successThreshold: {{ .Values.sentinel.livenessProbe.successThreshold }}
          {{- end }}
          {{- if and (or .Values.auth.enabled .Values.auth.sentinel) (not .Values.auth.acl.enabled) }}
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "redis.secretName" . }}
                  key: {{ include "redis.secretPasswordKey" . }}
          {{- end }}
          {{- if .Values.sentinel.preStop.enabled }}
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/bash
                  - /scripts/prestop-sentinel.sh
          {{- end }}
          resources: {{- toYaml .Values.sentinel.resources | nindent 12 }}
        {{- end }}
        {{- if .Values.metrics.enabled }}
        - name: metrics
          securityContext: {{ include "cloudpirates.renderContainerSecurityContext" . | nindent 12 }}
          image: {{ include "redis.metrics.image" . | quote }}
          imagePullPolicy: {{ include "cloudpirates.imagePullPolicy" (dict "image" .Values.metrics.image) }}
          {{- if and .Values.auth.enabled (not .Values.auth.acl.enabled) }}
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "redis.secretName" . }}
                  key: {{ include "redis.secretPasswordKey" . }}
          {{- end }}
          {{- if .Values.metrics.extraArgs }}
          command:
            - /bin/sh
            - -c
            - |
              {{- include "redis.auth.acl.setupScript" (dict "type" "metrics" "context" .) | nindent 14 }}
              /redis_exporter {{- range .Values.metrics.extraArgs }} {{ . }}{{- end }}
          {{- else }}
          command:
            - /bin/sh
            - -c
            - |
              {{- include "redis.auth.acl.setupScript" (dict "type" "metrics" "context" .) | nindent 14 }}
              /redis_exporter
          {{- end }}
          ports:
            - name: metrics
              containerPort: 9121
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: metrics
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 1
            failureThreshold: 3
            successThreshold: 1
          resources: {{- toYaml .Values.metrics.resources | nindent 12 }}
          {{- if and .Values.auth.acl.enabled .Values.auth.acl.existingSecret }}
          volumeMounts:
            - name: acl-file
              mountPath: {{ include "redis.auth.acl.path" . }}
              subPath: {{ include "redis.auth.acl.file" . }}
              readOnly: true
          {{- end }}
        {{- end }}
      volumes:
        {{- if not .Values.persistence.enabled }}
        - name: data
          emptyDir: {}
        {{- end }}
        {{- if .Values.persistence.existingClaim }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim }}
        {{- end }}
        {{- if (list "replication" "cluster" | has .Values.architecture) }}
        - name: redis-config
          emptyDir: {}
        {{- if .Values.sentinel.enabled }}
        - name: sentinel-config
          emptyDir: {}
        - name: prestop-script
          configMap:
            name: {{ include "redis.fullname" . }}-prestop-script
            defaultMode: 0755
        {{- end }}
        {{- end }}
        {{- if or .Values.config.content .Values.config.existingConfigmap }}
        - name: config
          configMap:
            {{- if .Values.config.existingConfigmap }}
            name: {{ .Values.config.existingConfigmap }}
            {{- else }}
            name: {{ include "redis.fullname" . }}-config
            {{- end }}
        {{- end }}
        {{- if .Values.tls.enabled }}
        - name: tls-certs
          secret:
            secretName: {{ required "TLS secret name is required when TLS is enabled" .Values.tls.existingSecret }}
            items:
              - key: {{ .Values.tls.certFilename }}
                path: {{ .Values.tls.certFilename }}
              - key: {{ .Values.tls.certKeyFilename }}
                path: {{ .Values.tls.certKeyFilename }}
              - key: {{ .Values.tls.certCAFilename }}
                path: {{ .Values.tls.certCAFilename }}
        {{- if .Values.tls.client.existingSecret }}
        - name: tls-client-certs
          secret:
            secretName: {{ .Values.tls.client.existingSecret }}
            items:
              - key: {{ .Values.tls.client.certFilename }}
                path: {{ .Values.tls.client.certFilename }}
              - key: {{ .Values.tls.client.certKeyFilename }}
                path: {{ .Values.tls.client.certKeyFilename }}
        {{- end }}
        {{- end }}
        {{- if and .Values.auth.acl.enabled .Values.auth.acl.existingSecret }}
        - name: acl-file
          secret:
            secretName: {{ required "ACL secret name is required when ACL is enabled" .Values.auth.acl.existingSecret }}
        {{- end }}
        {{- if .Values.extraVolumes }}
        {{- toYaml .Values.extraVolumes | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds | default 30 }}
  {{- if .Values.persistence.enabled }}
  {{- if .Values.persistentVolumeClaimRetentionPolicy.enabled }}
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: {{ .Values.persistentVolumeClaimRetentionPolicy.whenDeleted }}
    whenScaled: {{ .Values.persistentVolumeClaimRetentionPolicy.whenScaled }}
  {{- end }}
  {{- if not .Values.persistence.existingClaim }}
  volumeClaimTemplates:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: data
        labels:
          {{- include "redis.selectorLabels" . | nindent 10 }}
          {{- with .Values.podLabels }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
        {{- with .Values.persistence.annotations }}
        annotations:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      spec:
        accessModes:
          - {{ .Values.persistence.accessMode | quote }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size | quote }}
  {{- end }}
{{- end }}
