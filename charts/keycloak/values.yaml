## @section Global parameters
global:
  ## @param global.imageRegistry Global Docker Image registry
  imageRegistry: ""
  ## @param global.imagePullSecrets Global Docker registry secret names as an array
  imagePullSecrets: []

## @section Common parameters
## @param nameOverride String to partially override keycloak.fullname
nameOverride: ""
## @param fullnameOverride String to fully override keycloak.fullname
fullnameOverride: ""
## @param namespaceOverride String to override the namespace for all resources
namespaceOverride: ""
## @param commonLabels Labels to add to all deployed objects
commonLabels: {}
## @param commonAnnotations Annotations to add to all deployed objects
commonAnnotations: {}

## @section Keycloak image configuration
image:
  ## @param image.registry Keycloak image registry
  registry: docker.io
  ## @param image.repository Keycloak image repository
  repository: keycloak/keycloak
  ## @param image.tag Keycloak image tag (immutable tags are recommended)
  tag: "26.5.6@sha256:8d44614c74798322c4e07fbe0ecb15cfbb5879d69b484628555f58ade06f0d8c"
  ## @param image.imagePullPolicy Keycloak image pull policy
  imagePullPolicy: Always
  ## @param image.command Keycloak container command
  command: "/opt/keycloak/bin/kc.sh"

## @section Deployment configuration
## @param replicaCount Number of Keycloak replicas to deploy
replicaCount: 1

## @section Pod annotations and labels
## @param podAnnotations Map of annotations to add to the pods
podAnnotations: {}
## @param podLabels Map of labels to add to the pods
podLabels: {}

## @section Pod configuration
## @param shareProcessNamespace Enable process namespace sharing between containers in the pod
shareProcessNamespace: false

## @section extra volumes and volumes mount
## @param extraVolumes Optionally specify extra list of additional volumes for Keycloak pod
extraVolumes: []
## @param extraVolumeMounts Optionally specify extra list of additional volumeMounts for Keycloak container
extraVolumeMounts: []
## @param preserveThemes Disable mounting an emptyDir over /opt/keycloak/themes, preserving the themes bundled in the image.
preserveThemes: false
## @param preserveProviders Disable mounting an emptyDir over /opt/keycloak/providers, preserving the providers bundled in the image.
preserveProviders: false

## @section Extra init containers for Keycloak pod
## @param Optionnaly specify an extra list of initContainer for the Keycloak pod
## Example:
## initContainers:
##   - name: <container-name>
##     image: <your-image>
##     imagePullPolicy: Always
##
extraInitContainers: []

## @section Extra containers for Keycloak pod
## @param extraContainers Additional containers to add to the pod
## Example:
## extraContainers:
##   - name: sidecar
##     image: nginx:latest
##     imagePullPolicy: Always
##     ports:
##       - containerPort: 8000
##     volumeMounts:
##       - name: tmp
##         mountPath: /tmp
extraContainers: []

## @section Security Context
podSecurityContext:
  ## @param podSecurityContext.fsGroup Group ID for the volumes of the pod
  fsGroup: 1001

containerSecurityContext:
  ## @param containerSecurityContext.allowPrivilegeEscalation Enable container privilege escalation
  allowPrivilegeEscalation: false
  ## @param containerSecurityContext.runAsNonRoot Configure the container to run as a non-root user
  runAsNonRoot: true
  ## @param containerSecurityContext.runAsUser User ID for the Keycloak container
  runAsUser: 1001
  ## @param containerSecurityContext.runAsGroup Group ID for the Keycloak container
  runAsGroup: 1001
  ## @param containerSecurityContext.readOnlyRootFilesystem Mount container root filesystem as read-only
  readOnlyRootFilesystem: false
  ## @param containerSecurityContext.capabilities.drop Linux capabilities to be dropped
  capabilities:
    drop:
      - ALL

## @section Keycloak Configuration
keycloak:
  ## @param keycloak.adminUser Keycloak admin username
  adminUser: admin
  ## @param keycloak.adminPassword Keycloak admin password
  adminPassword: ""
  ## @param keycloak.existingSecret Name of existing secret to use for Keycloak admin credentials
  existingSecret: ""
  ## @param keycloak.secretKeys Secret keys for admin credentials
  secretKeys:
    adminPasswordKey: "admin-password"
  ## @param keycloak.hostname Keycloak hostname including scheme (e.g. https://keycloak.example.com)
  hostname: ""
  ## @param keycloak.hostnameAdmin Keycloak admin hostname including scheme (e.g. https://keycloak.example.com)
  hostnameAdmin: ""
  ## @param keycloak.hostnameStrict Enable strict hostname resolution
  hostnameStrict: false
  ## @param keycloak.hostnameBackchannel Keycloak backchannel hostname including scheme (e.g. https://keycloak.example.com)
  hostnameBackchannel: ""
  ## @param keycloak.httpEnabled Enable HTTP listener
  httpEnabled: true
  ## @param keycloak.httpsEnabled Enable HTTPS listener
  httpsEnabled: false
  ## @param keycloak.httpPort HTTP port
  httpPort: 8080
  ## @param keycloak.httpsPort HTTPS port
  httpsPort: 8443
  ## @param keycloak.managementPort Management interface port (health endpoints are served here)
  managementPort: 9000
  ## @param keycloak.proxyHeaders The proxy headers that should be accepted by the server. (forwarded, xforwarded). Must be set when running behind a reverse proxy (e.g. nginx ingress), otherwise Keycloak will not trust X-Forwarded-* headers and will generate incorrect URLs. Leave empty only when Keycloak is directly exposed without a proxy.
  proxyHeaders: ""
  ## @param keycloak.proxyProtocolEnabled  Whether the server should use the HA PROXY protocol when serving requests from behind a proxy. (true, false(default))
  proxyProtocolEnabled: false
  ## @param keycloak.proxyTrustedAddresses A comma separated list of trusted proxy addresses
  proxyTrustedAddresses: ""
  ## @param keycloak.production Enable production mode (runs 'start' instead of 'start-dev'). Should only be disabled for local development.
  production: true
  ## @param keycloak.httpRelativePath Set relative path for serving resources; must start with a /
  httpRelativePath: /
  ## @param keycloak.extraArgsPrefix Additional arguments to pass before the start command (e.g., for --config-file)
  extraArgsPrefix: []
  ## @param keycloak.extraArgs Additional arguments to pass to the Keycloak startup command
  extraArgs: []

## @section TLS Configuration
tls:
  ## @param tls.enabled Enable TLS/HTTPS support using custom certificates
  enabled: false
  ## @param tls.existingSecret Name of existing secret containing TLS certificate and key (PEM format)
  ## The secret should contain 'tls.crt' and 'tls.key' keys
  ## Note: If certManager.enabled is true, this will be auto-generated
  existingSecret: ""
  ## @param tls.certificateFile Path where the TLS certificate file will be mounted (internal)
  certificateFile: "/opt/keycloak/certs/tls.crt"
  ## @param tls.certificateKeyFile Path where the TLS certificate key file will be mounted (internal)
  certificateKeyFile: "/opt/keycloak/certs/tls.key"
  ## @section cert-manager Configuration
  ## @descriptionStart
  ## Configure cert-manager to automatically provision and renew TLS certificates
  ## Requires cert-manager to be installed in the cluster
  ## @descriptionEnd
  certManager:
    ## @param tls.certManager.enabled Enable cert-manager integration for automatic certificate provisioning
    enabled: false
    ## @param tls.certManager.issuerRef.name Name of the cert-manager Issuer or ClusterIssuer
    ## @param tls.certManager.issuerRef.kind Kind of the cert-manager issuer (Issuer or ClusterIssuer)
    ## @param tls.certManager.issuerRef.group Group of the cert-manager issuer (default: cert-manager.io)
    issuerRef:
      name: ""
      kind: ClusterIssuer
      group: cert-manager.io
    ## @param tls.certManager.duration Certificate duration (default: 2160h - 90 days)
    duration: ""
    ## @param tls.certManager.renewBefore Time before expiry to renew certificate (default: 360h - 15 days)
    renewBefore: ""
    ## @param tls.certManager.commonName Certificate common name (defaults to first dnsName if not specified)
    commonName: ""
    ## @param tls.certManager.dnsNames List of DNS names for the certificate (uses ingress.hosts if not specified)
    dnsNames: []
    ## @param tls.certManager.ipAddresses List of IP addresses for the certificate
    ipAddresses: []
    ## @param tls.certManager.secretName Name for the generated secret (defaults to <fullname>-tls)
    secretName: ""
    ## @param tls.certManager.usages Certificate key usages
    usages:
      - digital signature
      - key encipherment
    ## @param tls.certManager.annotations Additional annotations for the Certificate resource
    annotations: {}
  ## @param tls.truststoreEnabled Enable truststore for client certificate validation or outgoing HTTPS requests
  truststoreEnabled: false
  ## @param tls.truststoreExistingSecret Name of existing secret containing truststore file (Java Keystore format)
  ## The secret should contain 'truststore.jks' key or the key specified in the value 'tls.truststoreExistingSecretKey'
  truststoreExistingSecret: ""
  ## @param tls.truststoreExistingSecretKey Key within the truststore secret that holds the truststore file
  truststoreExistingSecretKey: "truststore.jks"
  ## @param tls.truststorePassword Password for the truststore (use with caution - consider using existingSecret)
  truststorePassword: ""
  ## @param tls.truststoreFile Path where the truststore file will be mounted (internal)
  truststoreFile: "/opt/keycloak/truststore/truststore.jks"

## @section Database Configuration
database:
  ## @param database.type Database type (postgres, mysql, mariadb, mssql, empty string)
  ## Note: If database.type is an empty string, all --db* settings will be omitted, e.g. type, url, etc.
  ## Note: H2 databases (h2-file, h2-mem) are not supported due to readonly filesystem restrictions
  ## Use embedded postgres or mariadb instead
  type: postgres
  ## @param database.host Database host (only used when not using embedded database)
  host: ""
  ## @param database.port Database port (only used when not using embedded database, defaults: postgres=5432, mysql/mariadb=3306, mssql=1443)
  port: ""
  ## @param database.schema Database schema
  schema: ""
  ## @param database.urlProperties Additional database url properties
  urlProperties: ""
  ## @param database.name Database name (only used when not using embedded database)
  name: keycloak
  ## @param database.username Database username (only used when not using embedded database)
  username: keycloak
  ## @param database.password Database password (only used when not using embedded database)
  password: ""
  ## @param database.existingSecret Name of existing secret for database credentials (only used when not using embedded database)
  existingSecret: ""
  ## @param database.secretKeys Secret keys for database credentials (only used when not using embedded database)
  secretKeys:
    passwordKey: "db-password"
    usernameKey: "db-username"
  ## @param database.jdbcParams Additional JDBC parameters
  jdbcParams: ""

## @section Cache Configuration
cache:
  ## @param cache.stack Cache stack (local, ispn, default)
  stack: local
  ## @param cache.configFile Custom cache configuration file
  configFile: ""

## @section Realm Configuration
realm:
  ## @param realm.import Enable import of realms from /opt/keycloak/data/import
  import: false
  ## @param realm.configFile Json config for initial realm configuration, mounted in /opt/keycloak/data/import
  configFile: ""
  ## @param realm.existingSecret Name of existing secret containing realm configuration (key: realm.json)
  existingSecret: ""

## @section Features Configuration
features:
