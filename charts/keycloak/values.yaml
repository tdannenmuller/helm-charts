  httpsNodePort: 30443

## @section Ingress configuration
ingress:
  ## @param ingress.enabled Enable ingress record generation for Keycloak
  enabled: false
  ## @param ingress.className IngressClass that will be used to implement the Ingress
  className: ""
  ## @param ingress.annotations Additional annotations for the Ingress resource
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
    # nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
  ## @param ingress.hosts[0].host Hostname for Keycloak ingress
  ## @param ingress.hosts[0].paths[0].path Path for Keycloak ingress
  ## @param ingress.hosts[0].paths[0].pathType Path type for Keycloak ingress
  hosts:
    - host: keycloak.local
      paths:
        - path: /
          pathType: Prefix
  ## @param ingress.tls TLS configuration for Keycloak ingress
  tls: []
  #  - secretName: keycloak-tls
  #    hosts:
  #      - keycloak.local

## @section Gateway API parameters
## TLS termination happens at the Gateway listener level, not at the backend service.
## To serve traffic from an HTTPS listener, set sectionName to the listener's name:
##
##   parentRefs:
##     - name: my-gateway
##       sectionName: https   # matches the HTTPS listener defined in the Gateway resource
##
## The backend always receives plain HTTP traffic regardless of the listener protocol.
gatewayAPI:
  httpRoute:
    ## @param gatewayAPI.httpRoute.enabled Enable Gateway API HTTPRoute generation for Keycloak
    enabled: false
    ## @param gatewayAPI.httpRoute.annotations Additional annotations for the HTTPRoute resource
    annotations: {}
    ## @param gatewayAPI.httpRoute.parentRefs References to the parent Gateways
    parentRefs:
      - name: gateway
        namespace: ""
        sectionName: ""
    ## @param gatewayAPI.httpRoute.hostnames List of hostnames to match
    hostnames:
      - keycloak.local
    ## @param gatewayAPI.httpRoute.rules HTTPRoute rules
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /

## @section Resources
resources: {}
  ## We usually recommend not to specify default resources and to leave this as a conscious
  ## choice for the user. This also increases chances charts run on environments with little
  ## resources, such as Minikube. If you do want to specify resources, uncomment the following
  ## lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 500m
  #   memory: 512Mi
  # requests:
  #   cpu: 250m
  #   memory: 256Mi

