## @section Init Container Configuration
initContainers:
  copyQuarkusLib:
    ## @param initContainers.copyQuarkusLib.resources Resource requests and limits for the copy-quarkus-lib init container
    resources: {}
  waitForPostgres:
    ## @param initContainers.waitForPostgres.image PostgreSQL init container image for waiting (leave empty to use registry/repository/tag)
    image: ""
    ## @param initContainers.waitForPostgres.registry PostgreSQL image registry (overrides global.imageRegistry)
    registry: ""
    ## @param initContainers.waitForPostgres.repository PostgreSQL image repository
    repository: postgres
    ## @param initContainers.waitForPostgres.tag PostgreSQL image tag
    tag: "18.3@sha256:a9abf4275f9e99bff8e6aed712b3b7dfec9cac1341bba01c1ffdfce9ff9fc34a"
    ## @param initContainers.waitForPostgres.pullPolicy PostgreSQL image pull policy
