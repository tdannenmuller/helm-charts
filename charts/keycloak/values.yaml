  httpPort: 8080
  ## @param service.httpsPort Keycloak HTTPS service port
  httpsPort: 8443
  ## @param service.httpTargetPort Keycloak HTTP container port
  httpTargetPort: 8080
  ## @param service.httpsTargetPort Keycloak HTTPS container port
  httpsTargetPort: 8443
