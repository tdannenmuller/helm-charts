    tag: "12.2.2@sha256:e16f61b8f6ed25111adbb1c5c19bbc2904efc8ed14029999af0cbe1c7ae18bf1"
    ## @param initContainers.waitForMariadb.pullPolicy MariaDB image pull policy
    pullPolicy: IfNotPresent
    ## @param initContainers.waitForMariadb.resources Resource requests and limits for MariaDB init container
    resources:
      limits:
        cpu: 100m
        memory: 64Mi
      requests:
        cpu: 100m
        memory: 32Mi

## @section PostgreSQL Configuration (when postgres.enabled=true)
## @descriptionStart
## PostgreSQL configuration for embedded database
## @descriptionEnd
postgres:
  ## @param postgres.enabled Enable embedded PostgreSQL database
  enabled: true
  ## @param postgres.auth.database PostgreSQL database name
  ## @param postgres.auth.username PostgreSQL database user (leave empty for default 'postgres')
  ## @param postgres.auth.password PostgreSQL database password
  ## @param postgres.auth.existingSecret Existing secret containing PostgreSQL credentials
  auth:
    database: "keycloak"
    username: ""
    password: ""
    existingSecret: ""

## @section MariaDB Configuration (when mariadb.enabled=true)
## @descriptionStart
## MariaDB configuration for embedded database
## @descriptionEnd
mariadb:
  ## @param mariadb.enabled Enable embedded MariaDB database (set to false when using postgres)
  enabled: false
  ## @param mariadb.auth.database MariaDB database name
  ## @param mariadb.auth.username MariaDB database user (leave empty for root user)
  ## @param mariadb.auth.password MariaDB database password
  ## @param mariadb.auth.rootPassword MariaDB root password
  auth:
    database: "keycloak"
    username: ""
    password: ""
    rootPassword: ""
    ## @param mariadb.auth.existingSecret Existing secret containing MariaDB root and user passwords
    existingSecret: ""
    ## @param mariadb.auth.secretKeys Secret keys for MariaDB credentials
    secretKeys:
      rootPasswordKey: mariadb-root-password
      userPasswordKey: mariadb-password
